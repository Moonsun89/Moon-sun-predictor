<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.5.1 PRO</title>
    <style>
        :root { --bg: #030508; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 85%; max-width: 300px; }

        /* Header & Small Buttons */
        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 10px; z-index: 1000; }
        .btn-mini { background: rgba(0,123,255,0.1); color: var(--blue); border: 1px solid var(--blue); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        /* Title & Branding */
        .header-section { text-align: center; margin-top: 50px; }
        .app-name { font-size: 20px; font-weight: 900; margin: 0; }
        .c-y { color: var(--yellow); } .c-b { color: var(--blue); } .c-g { color: var(--green); }
        .sub-title { font-size: 11px; color: var(--blue); letter-spacing: 1.5px; font-weight: bold; margin-top: 2px; }

        /* Win Rate & Rounds */
        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 90%; max-width: 340px; text-align: center; border: 1px solid #1a2c3a; }
        .win-label-blue { color: var(--blue); font-weight: bold; }
        .win-label-yellow { color: var(--yellow); font-weight: bold; }
        .round-area { font-size: 16px; font-weight: bold; margin-top: 5px; }
        .curr-r { color: var(--red); } .max-r { color: var(--yellow); }

        /* Timer Styling */
        #cooldownTimer { color: var(--red); font-size: 14px; font-weight: 900; display: none; margin-bottom: 10px; border: 1px solid var(--red); padding: 5px 15px; border-radius: 20px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Warning Text */
        #warningBox { color: var(--red); font-size: 11px; font-weight: bold; margin-bottom: 5px; display: none; text-align: center; }

        /* Grid & Processing */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 10px; border-radius: 12px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 10px var(--green); background: rgba(0,255,136,0.1); }

        #mathProcess { font-size: 9px; color: #555; font-family: monospace; height: 12px; margin-bottom: 5px; overflow: hidden; width: 90%; text-align: center; }
        #loader { width: 90%; max-width: 340px; height: 4px; background: #000; border-radius: 2px; display: none; overflow: hidden; margin-bottom: 10px; }
        #bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--green)); }

        /* Inputs & Main Buttons */
        input, select { width: 90%; max-width: 340px; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 8px; margin-bottom: 8px; text-align: center; outline: none; font-size: 12px; }
        #mainBtn { width: 90%; max-width: 340px; padding: 16px; background: linear-gradient(to right, #007bff, #0052ad); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #mainBtn:disabled { background: #1a2c3a; color: #444; }

        .footer-btns { display: flex; width: 90%; max-width: 340px; gap: 8px; margin-top: 10px; align-items: center; }
        #clearBtn { flex: 3; padding: 12px; background: #1a2c3a; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 12px; }
        #instBtn { flex: 1.2; padding: 8px; background: var(--yellow); color: #000; border: none; border-radius: 6px; font-weight: bold; font-size: 10px; }

        /* Instructions Modal */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-height: 80%; background: #0d1217; border: 2px solid var(--blue); border-radius: 15px; padding: 20px; z-index: 10000; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h3 style="color:var(--yellow); margin-top:0;">ACCESS KEY</h3>
            <input type="password" id="keyInput" placeholder="Enter Key...">
            <button onclick="checkKey()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">LOGIN</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()">LANG: EN/SW</button>
        <button class="btn-mini" id="sndBtn" onclick="toggleSnd()">SOUND: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON</span> <span class="c-b">SUN</span> <span class="c-g">PREDICTOR</span> <span class="c-y">V9.5 PRO</span></h1>
        <div class="sub-title">MINES 1WIN PREDICTOR</div>
    </div>

    <div class="info-panel">
        <div id="winDisplay">
            <span class="win-label-blue" id="winLabelL">KIWANGO CHA</span> 
            <span class="win-label-yellow" id="winLabelR"> USHINDI: 98%</span>
        </div>
        <div class="round-area">
            <span id="roundLabel">MZUNGUKO</span> <span class="curr-r" id="cRound">0</span> / <span class="max-r">4</span>
        </div>
    </div>

    <div id="cooldownTimer">WAIT: 10:00</div>
    <div id="warningBox">⚠️ ONYO: HAKIKISHA UNAWEKA HASH NA SALT</div>

    <select id="bombSelect" onchange="updateWinRate()">
        <option value="2">MABOMU 2</option>
        <option value="3">MABOMU 3</option>
        <option value="5">MABOMU 5</option>
        <option value="7">MABOMU 7</option>
    </select>
    
    <input type="text" id="hInput" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="sInput" placeholder="Salt ya Raundi Iliyopita...">

    <div id="mathProcess"></div>
    <div id="loader"><div id="bar"></div></div>

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="process()">PATA SIGNAL 🚀</button>
    
    <div class="footer-btns">
        <button id="clearBtn" onclick="location.reload()">🔄 AUTO CLEAR / SAFISHA</button>
        <button id="instBtn" onclick="toggleModal()">Instructions</button>
    </div>

    <div id="modal">
        <h3 id="mTitle" style="color:var(--yellow); text-align:center;">MAELEKEZO</h3>
        <div id="mBody" style="font-size:12px; line-height:1.6; color:#ccc;"></div>
        <button onclick="toggleModal()" style="width:100%; margin-top:15px; padding:10px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold;">CLOSE</button>
    </div>

    <script>
        let round = 0;
        let isMuted = false;
        let lang = 'sw';
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const data = {
            sw: {
                winL: "KIWANGO CHA", winR: " USHINDI: ", round: "MZUNGUKO", warn: "⚠️ ONYO: HAKIKISHA UNAWEKA HASH NA SALT",
                phH: "Hash ya Raundi Iliyopita...", phS: "Salt ya Raundi Iliyopita...",
                btn: "PATA SIGNAL 🚀", inst: "Instructions", wait: "SUBIRI: ",
                mTitle: "Hatua za Ushindi (V9.5 PRO)",
                mBody: `
                <b>1. Matumizi ya Batani:</b><br>
                1. <b>PATA SIGNAL:</b> Inachakata data 2.5M kupata ramani salama.<br>
                2. <b>AUTO CLEAR:</b> Inafuta data ya mchezo uliopita.<br>
                3. <b>SOUND:</b> Inazima/washa sauti.<br><br>
                <b>2. Hatua za Ushindi:</b><br>
                1. <b>MUHIMU:</b> Bonyeza <b>BET</b> kwanza kwenye Mines.<br>
                2. Copy Hash na Salt ya raundi iliyopita.<br>
                3. Paste hapa, bonyeza PATA SIGNAL.<br>
                4. Raundi 4 zikiisha, subiri dakika 10 kuanza upya.<br><br>
                <b>Channel:</b> winpredictor@channel.com`
            },
            en: {
                winL: "WINNING", winR: " RATE: ", round: "ROUND", warn: "⚠️ WARNING: ENSURE HASH AND SALT ARE ENTERED",
                phH: "Previous Round Hash...", phS: "Previous Round Salt...",
                btn: "GET SIGNAL 🚀", inst: "Instructions", wait: "WAIT: ",
                mTitle: "VICTORY GUIDELINES (V9.5)",
                mBody: `
                <b>1. Button Usage:</b><br>
                1. <b>GET SIGNAL:</b> Processes 2.5M points.<br>
                2. <b>AUTO CLEAR:</b> Clears previous data session.<br>
                3. <b>SOUND:</b> Toggles winning sound alerts.<br><br>
                <b>2. Steps to Win:</b><br>
                1. <b>CRUCIAL:</b> Click <b>BET</b> first on Mines.<br>
                2. Copy Hash and Salt from previous round.<br>
                3. After 4 rounds, wait 10 minutes to reset.<br><br>
                <b>Channel:</b> winpredictor@channel.com`
            }
        };

        function checkKey() {
            if(document.getElementById('keyInput').value === 'Mr winner123') {
                document.getElementById('loginOverlay').style.display = 'none';
            } else { alert("Wrong Access Key!"); }
        }

        function toggleLang() { lang = (lang === 'sw' ? 'en' : 'sw'); updateUI(); }
        function toggleSnd() { isMuted = !isMuted; document.getElementById('sndBtn').innerText = "SOUND: " + (isMuted ? "OFF" : "ON"); }

        function updateUI() {
            const d = data[lang];
            document.getElementById('winLabelL').innerText = d.winL;
            document.getElementById('roundLabel').innerText = d.round;
            document.getElementById('hInput').placeholder = d.phH;
            document.getElementById('sInput').placeholder = d.phS;
            document.getElementById('mainBtn').innerText = d.btn;
            document.getElementById('instBtn').innerText = d.inst;
            document.getElementById('mTitle').innerText = d.mTitle;
            document.getElementById('mBody').innerHTML = d.mBody;
            document.getElementById('warningBox').innerText = d.warn;
            updateWinRate();
        }

        function updateWinRate() {
            const b = document.getElementById('bombSelect').value;
            const rates = { "2": "98%", "3": "95%", "5": "85%", "7": "75%" };
            document.getElementById('winLabelR').innerText = data[lang].winR + rates[b];
        }

        function playBeep(freq, dur) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; osc.start();
            setTimeout(() => osc.stop(), dur);
        }

        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            grid.appendChild(div);
        }

        function process() {
            const h = document.getElementById('hInput').value;
            const s = document.getElementById('sInput').value;
            if(!h || !s) {
                document.getElementById('warningBox').style.display = 'block';
                return;
            }
            document.getElementById('warningBox').style.display = 'none';

            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');
            const bar = document.getElementById('bar');
            const math = document.getElementById('mathProcess');

            btn.disabled = true;
            loader.style.display = 'block';
            
            let p = 0;
            const inter = setInterval(() => {
                p += 2;
                bar.style.width = p + "%";
                math.innerText = "ALGO_2.5M_SYNC_" + Math.random().toString(16).slice(2, 8).toUpperCase() + " >> " + (p * 25000).toLocaleString();
                if (p % 20 === 0) playBeep(400, 50);
                if(p >= 100) {
                    clearInterval(inter);
                    runAlgo(h, s);
                }
            }, 40);
        }

        function runAlgo(h, s) {
            round++;
            document.getElementById('cRound').innerText = round;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            let seed = 0;
            let str = h + s + round;
            for(let i=0; i<str.length; i++) seed = ((seed << 5) - seed) + str.charCodeAt(i);
            
            const bombs = parseInt(document.getElementById('bombSelect').value);
            let count = bombs <= 3 ? 5 : 3;
            let spots = [];
            let tSeed = Math.abs(seed);

            while(spots.length < count) {
                tSeed = (tSeed * 16807) % 2147483647;
                let pos = tSeed % 25;
                if(!spots.includes(pos)) spots.push(pos);
            }

            spots.forEach(idx => {
                cells[idx].innerHTML = '⭐';
                cells[idx].classList.add('safe');
            });

            playBeep(800, 200);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mathProcess').innerText = "DATA ANALYTICS SUCCESS";

            setTimeout(() => {
                document.getElementById('hInput').value = "";
                document.getElementById('sInput').value = "";
                if(round < 4) {
                    document.getElementById('mainBtn').disabled = false;
                } else {
                    startCooldown();
                }
            }, 1500);
        }

        function startCooldown() {
            const timerEl = document.getElementById('cooldownTimer');
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = "COOLDOWN ACTIVE";
            timerEl.style.display = 'block';

            let timeLeft = 600; // 10 minutes in seconds
            const timerInter = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerEl.innerText = data[lang].wait + mins + ":" + (secs < 10 ? "0" : "") + secs;
                
                if(timeLeft <= 0) {
                    clearInterval(timerInter);
                    round = 0;
                    document.getElementById('cRound').innerText = 0;
                    timerEl.style.display = 'none';
                    btn.disabled = false;
                    btn.innerText = data[lang].btn;
                }
                timeLeft--;
            }, 1000);
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'block' ? 'none' : 'block');
        }

        window.onload = updateUI;
    </script>
</body>
</html>
