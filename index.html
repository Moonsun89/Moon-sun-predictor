<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.0 FINAL</title>
    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; position: relative; }
        
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        
        /* Sound Controls Layout */
        .snd-container { position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; background: rgba(13, 18, 23, 0.8); padding: 5px; border-radius: 8px; border: 1px solid var(--blue); }
        .snd-btn { background: var(--blue); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .snd-select { background: #000; color: var(--yellow); border: 1px solid var(--blue); font-size: 10px; border-radius: 4px; padding: 2px; }

        .title-container { text-align: center; margin-bottom: 10px; margin-top: 40px; }
        .main-title { font-size: 22px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-title { font-size: 14px; font-weight: bold; margin-top: 5px; }
        
        .color-blue { color: var(--blue); } .color-yellow { color: var(--yellow); } .color-green { color: var(--green); }

        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .win-rate { font-size: 13px; font-weight: bold; }
        .win-text-blue { color: var(--blue); } .win-text-yellow { color: var(--yellow); } .win-percent { color: var(--green); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 52px; height: 52px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; transition: 0.3s; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.1); }
        
        input, select { width: 100%; max-width: 320px; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 8px; box-sizing: border-box; }
        button#mainBtn { width: 100%; max-width: 340px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #333 !important; color: #777; cursor: not-allowed; }
        
        .timer-box { color: var(--red); font-weight: bold; display: none; margin-top: 5px; font-size: 14px; }
        .warning-text { color: var(--red); font-size: 11px; font-weight: bold; margin-bottom: 5px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="snd-container">
        <button class="snd-btn" id="muteToggle" onclick="toggleMute()">SND: ON</button>
        <select id="soundPicker" class="snd-select" onchange="previewSound()">
            <option value="https://www.soundjay.com/buttons/sounds/button-37a.mp3">SOUND 1</option>
            <option value="https://www.soundjay.com/buttons/sounds/button-09a.mp3">SOUND 2</option>
            <option value="https://www.soundjay.com/buttons/sounds/button-10.mp3">SOUND 3</option>
            <option value="https://www.soundjay.com/buttons/sounds/button-20.mp3">SOUND 4</option>
            <option value="https://www.soundjay.com/buttons/sounds/beep-07a.mp3">SOUND 5</option>
        </select>
    </div>

    <div id="loginScreen">
        <h2 class="color-blue">MOON SUN ACCESS</h2>
        <input type="password" id="accessKey" placeholder="Enter Access Key">
        <button onclick="checkKey()" style="width:200px; background: var(--blue); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold;">LOGIN</button>
    </div>

    <div class="title-container">
        <h2 class="main-title"><span class="color-blue">MOON</span> <span class="color-yellow">SUN</span> <span class="color-green">PREDICTOR V9.0</span></h2>
        <div class="sub-title"><span class="color-green">MINES</span> <span class="color-blue">PREDICTOR</span> <span class="color-yellow">(1WIN)</span></div>
    </div>

    <div class="info-panel">
        <div class="win-rate">
            <span class="win-text-blue">KIWANGO </span><span class="win-text-yellow">CHA USHINDI:</span> <span class="win-percent">99%</span>
        </div>
        <div>
            <span style="color:var(--blue);">MZUNGUKO:</span> 
            <span id="roundCounter" style="color:var(--red);">0</span> <span style="color:var(--yellow);">/ 4</span>
        </div>
        <div id="cooldownTimer" class="timer-box">MAPUMZIKO: <span id="timeVal">10:00</span></div>
    </div>

    <div id="warningMsg" class="warning-text">⚠️ ONYO: WEKA HASH NA SALT KWANZA!</div>

    <select id="bombSelect">
        <option value="2">2 BOMBS (NYOTA 6)</option>
        <option value="3">3 BOMBS (NYOTA 4)</option>
        <option value="5">5 BOMBS (NYOTA 3)</option>
        <option value="7">7 BOMBS (NYOTA 3)</option>
    </select>
    
    <input type="text" id="hashInput" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltInput" placeholder="Salt ya Raundi Iliyopita...">

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="processSignal()">PATA SIGNAL 🚀</button>

    <script>
        let roundsPlayed = 0;
        let isMuted = false;
        let audioSfx = new Audio("https://www.soundjay.com/buttons/sounds/button-37a.mp3");

        function checkKey() {
            if(document.getElementById('accessKey').value === "Mr winner123") {
                document.getElementById('loginScreen').style.display = 'none';
                playSfx();
            } else { alert("Wrong Access Key!"); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteToggle').innerText = isMuted ? "SND: OFF" : "SND: ON";
            document.getElementById('muteToggle').style.background = isMuted ? "var(--red)" : "var(--blue)";
        }

        function previewSound() {
            audioSfx.src = document.getElementById('soundPicker').value;
            playSfx();
        }

        function playSfx() {
            if(!isMuted) {
                audioSfx.currentTime = 0;
                audioSfx.play().catch(e => console.log("Audio play failed"));
            }
        }

        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        function processSignal() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            const b = document.getElementById('bombSelect').value;
            
            if(!h || !s) { document.getElementById('warningMsg').style.display = 'block'; return; }
            document.getElementById('warningMsg').style.display = 'none';

            playSfx();
            roundsPlayed++;
            document.getElementById('roundCounter').innerText = roundsPlayed;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            // --- DYNAMIC ALGORITHM ---
            let combined = h + s + b + roundsPlayed;
            let seed = 0;
            for (let i = 0; i < combined.length; i++) {
                seed = ((seed << 5) - seed) + combined.charCodeAt(i);
                seed |= 0;
            }

            let safeIndices = [];
            let limit = b == "2" ? 6 : (b == "3" ? 4 : (b == "5" ? 3 : 3));
            
            let tSeed = Math.abs(seed);
            while(safeIndices.length < limit) {
                tSeed = (tSeed * 16807) % 2147483647;
                let pos = Math.floor((tSeed / 2147483647) * 25);
                if(!safeIndices.includes(pos)) safeIndices.push(pos);
            }

            setTimeout(() => {
                safeIndices.forEach(idx => {
                    cells[idx].innerHTML = '⭐';
                    cells[idx].classList.add('safe');
                });
                document.getElementById('hashInput').value = "";
                document.getElementById('saltInput').value = "";
                if(roundsPlayed >= 4) startCooldown();
            }, 600);
        }

        function startCooldown() {
            let time = 600;
            const btn = document.getElementById('mainBtn');
            const timerBox = document.getElementById('cooldownTimer');
            const timeVal = document.getElementById('timeVal');
            btn.disabled = true;
            timerBox.style.display = 'block';

            const interval = setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                timeVal.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (time <= 0) {
                    clearInterval(interval);
                    roundsPlayed = 0;
                    document.getElementById('roundCounter').innerText = "0";
                    btn.disabled = false;
                    timerBox.style.display = 'none';
                }
                time--;
            }, 1000);
        }
    </script>
</body>
</html>
