<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PRO - V8.0</title>
    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .info-panel { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 10px; width: 95%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #000; padding: 10px; border-radius: 15px; border: 2px solid var(--blue); }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 1px solid #1b262f; transition: 0.3s; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.2); animation: flash 1s infinite; }
        @keyframes flash { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .input-group { width: 95%; max-width: 320px; display: flex; flex-direction: column; align-items: center; }
        input, select { width: 100%; padding: 11px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; margin-bottom: 8px; text-align: center; box-sizing: border-box; }
        .log-box { width: 90%; height: 35px; background: #000; border: 1px solid #1a2c3a; margin-top: 10px; padding: 5px; font-size: 9px; color: var(--yellow); font-family: monospace; overflow: hidden; border-radius: 4px; }
        button { width: 95%; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .refresh-btn { background: #1a2c3a; color: #888; padding: 10px; font-size: 10px; width: 140px; margin-top: 10px; border: 1px solid #333; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="color:var(--blue); margin-bottom:5px;">MOON SUN <span style="color:var(--yellow);">PRO V8</span></h2>
    
    <div class="info-panel">
        <div style="font-size: 11px; color: #888;">SERVER STATUS: <span style="color:var(--green);">ENCRYPTED</span></div>
        <div style="font-size: 14px; margin: 5px 0;">CYCLES: <span id="roundDisplay" style="color:var(--yellow); font-weight:bold;">0</span> / 4</div>
    </div>

    <div class="input-group">
        <select id="bombSelect">
            <option value="2">2 BOMBS (SCALPING - 6+ STARS)</option>
            <option value="3">3 BOMBS (BALANCED - 4 STARS)</option>
            <option value="5">5 BOMBS (STEALTH - 3 STARS)</option>
            <option value="7">7 BOMBS (AGGRESSIVE - 2 STARS)</option>
        </select>
        <input type="text" id="hashInput" placeholder="Paste TOP WIN HASH here...">
        <input type="text" id="saltInput" placeholder="Paste TOP WIN SALT here...">
    </div>

    <div class="grid" id="grid"></div>
    <div class="log-box" id="logBox">System Online. Data required.</div>

    <div class="controls" style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 12px;">
        <button id="mainBtn" onclick="analyzeData()">DECODE SYSTEM SIGNAL 🚀</button>
        <div class="refresh-btn" onclick="location.reload()">🔄 FULL SYSTEM RESET</div>
    </div>

    <script>
        const logBox = document.getElementById('logBox');
        function writeLog(msg) { logBox.innerHTML = "> " + msg + "<br>" + logBox.innerHTML; }

        // Tengeneza Gridi
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            document.getElementById('grid').appendChild(cell);
        }

        function analyzeData() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            const b = document.getElementById('bombSelect').value;
            const cells = document.querySelectorAll('.cell');
            
            if(!h || !s) {
                alert("Ingiza Hash na Salt kutoka kwenye mzunguko wa Top Win!");
                return;
            }

            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
            writeLog("Extracting Server Entropy...");
            
            setTimeout(() => {
                let seed = 0;
                let combined = h + s + b;
                for(let i=0; i<combined.length; i++) {
                    seed = ((seed << 5) - seed) + combined.charCodeAt(i);
                    seed |= 0;
                }
                
                writeLog("Scanning Probability Zones...");

                setTimeout(() => {
                    let safe = [];
                    let tSeed = Math.abs(seed);
                    
                    // Idadi ya nyota kulingana na maelekezo yako
                    let starLimit;
                    if(b == "2") starLimit = 6;
                    else if(b == "3") starLimit = 4;
                    else if(b == "5") starLimit = 3;
                    else starLimit = 2;
                    
                    while(safe.length < starLimit) {
                        tSeed = (tSeed * 16807) % 2147483647;
                        let p = Math.floor((tSeed / 2147483647) * 25);
                        if(!safe.includes(p)) safe.push(p);
                    }

                    safe.forEach(p => {
                        cells[p].innerHTML = '⭐';
                        cells[p].classList.add('safe');
                    });

                    writeLog(`Found ${starLimit} Safe Points. Sync OK.`);
                    updateProgress();
                }, 1000);
            }, 800);
        }

        function updateProgress() {
            let r = (parseInt(localStorage.getItem('v8_r')) || 0) + 1;
            localStorage.setItem('v8_r', r);
            document.getElementById('roundDisplay').innerText = r;
            if(r >= 4) { 
                document.getElementById('mainBtn').disabled = true;
                writeLog("Security Lock: Wait 10 mins.");
            }
        }
    </script>
</body>
</html>
