                    <!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON SUN PREDICTOR - FIXED</title>
    <style>
        :root {
            --bg: #0b141a; --card: #1e2a33; --blue: #007bff;
            --green: #00c853; --yellow: #ffeb3b; --text: #ffffff;
        }
        body {
            background: var(--bg); color: var(--text); font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }
        .info-panel {
            background: var(--card); padding: 10px; border-radius: 8px;
            margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center;
        }
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            background: var(--card); padding: 15px; border-radius: 12px;
        }
        .cell {
            width: 55px; height: 55px; background: #303a49; border-radius: 6px;
            display: flex; justify-content: center; align-items: center; font-size: 28px;
        }
        /* Rangi Maalum */
        .safe-3 { background: var(--green) !important; color: var(--yellow) !important; }
        .safe-5 { background: var(--blue) !important; color: var(--yellow) !important; }
        .safe-7 { background: var(--yellow) !important; color: var(--green) !important; }

        .controls { width: 100%; max-width: 350px; margin-top: 20px; }
        button {
            width: 100%; padding: 16px; border-radius: 8px; border: none;
            background: var(--blue); color: white; font-weight: bold; cursor: pointer;
        }
        button:disabled { background: #4a5568; opacity: 0.6; }
        .loading { display: none; color: var(--blue); margin: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h2 style="color:var(--blue); margin-bottom:5px;">MOON SUN</h2>
    <div class="info-panel">
        <div>Round: <span id="roundCount">0</span>/3</div>
        <div id="countdown" style="display:none; color:#ff4444;">Subiri: <span id="timer">15:00</span></div>
    </div>

    <div class="grid" id="grid"></div>
    <div id="loader" class="loading">Inachambua Data...</div>

    <div class="controls">
        <select id="bombSelect" style="width:100%; padding:10px; margin-bottom:10px; background:#1e2a33; color:white; border-radius:5px;">
            <option value="3">3 BOMBS (GREEN SAFE)</option>
            <option value="5">5 BOMBS (BLUE PRO)</option>
            <option value="7">7 BOMBS (YELLOW GOLD)</option>
        </select>
        <button id="btn" onclick="generateSignal()">PATA SIGNAL 🚀</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const btn = document.getElementById('btn');
        const roundDisplay = document.getElementById('roundCount');
        
        let rounds = parseInt(localStorage.getItem('mRounds')) || 0;
        let lastTime = parseInt(localStorage.getItem('mLastTime')) || 0;

        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        function updateUI() {
            const now = Date.now();
            const waitTime = 15 * 60 * 1000;
            
            if (rounds >= 3 && (now - lastTime) < waitTime) {
                btn.disabled = true;
                document.getElementById('countdown').style.display = 'block';
                const remaining = waitTime - (now - lastTime);
                startTimer(remaining);
            } else {
                if ((now - lastTime) >= waitTime) {
                    rounds = 0;
                    localStorage.setItem('mRounds', 0);
                }
                btn.disabled = false;
                document.getElementById('countdown').style.display = 'none';
            }
            roundDisplay.innerText = rounds;
        }

        function startTimer(ms) {
            const timerSpan = document.getElementById('timer');
            const interval = setInterval(() => {
                const now = Date.now();
                const remaining = (15 * 60 * 1000) - (now - localStorage.getItem('mLastTime'));
                if (remaining <= 0) {
                    clearInterval(interval);
                    updateUI();
                } else {
                    let m = Math.floor(remaining / 60000);
                    let s = Math.floor((remaining % 60000) / 1000);
                    timerSpan.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                }
            }, 1000);
        }

        function generateSignal() {
            const cells = document.querySelectorAll('.cell');
            const bombCount = document.getElementById('bombSelect').value;
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            document.getElementById('loader').style.display = 'block';
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                const count = bombCount == 3 ? 4 : (bombCount == 5 ? 3 : 2);
                const pos = [];
                while(pos.length < count) {
                    let r = Math.floor(Math.random() * 25);
                    if(!pos.includes(r)) pos.push(r);
                }

                pos.forEach(p => {
                    cells[p].innerHTML = '⭐';
                    cells[p].classList.add(bombCount == 3 ? 'safe-3' : (bombCount == 5 ? 'safe-5' : 'safe-7'));
                });

                rounds++;
                localStorage.setItem('mRounds', rounds);
                localStorage.setItem('mLastTime', Date.now());
                updateUI();
            }, 1500);
        }

        updateUI();
    </script>
</body>
</html>
