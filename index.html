<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR ULTRA</title>
    <style>
        :root { --bg: #030508; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; --purple: #af40ff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; }

        #loginOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 85%; max-width: 300px; }

        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 10px; z-index: 1000; }
        .btn-mini { background: rgba(0,123,255,0.1); color: var(--blue); border: 1px solid var(--blue); padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .header-section { text-align: center; margin-top: 55px; }
        .app-name { font-size: 22px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .c-y { color: var(--yellow); } .c-b { color: var(--blue); } .c-g { color: var(--green); }

        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 90%; max-width: 340px; text-align: center; border: 1px solid #1a2c3a; }
        #cooldownDisplay { color: var(--red); font-size: 15px; font-weight: 900; display: none; margin-bottom: 10px; border: 1px solid var(--red); padding: 6px 18px; border-radius: 20px; animation: blinker 1s infinite; }
        
        #warningLabel { color: var(--red); font-size: 12px; font-weight: bold; display: none; margin-bottom: 5px; text-align: center; animation: blinker 0.8s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid #1b262f; transition: 0.2s; }
        
        .cell.safe { border: 2.5px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0,255,136,0.2); transform: scale(1.05); }
        .cell.bomb { border: 1px solid rgba(255,51,51,0.5); background: rgba(255,51,51,0.15); font-size: 20px; }
        .cell.shaded { background: #070b10; border: 1px solid #1a2c3a; }

        input, select { width: 90%; max-width: 340px; padding: 13px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 10px; margin-bottom: 10px; text-align: center; outline: none; font-size: 13px; font-weight: bold; }
        #bombSelect { color: var(--yellow); font-size: 14px; background: #0a0e14; cursor: pointer; }

        #mainBtn { width: 90%; max-width: 340px; padding: 18px; background: linear-gradient(to right, #007bff, #0052ad); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 15px; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        #mainBtn:disabled { background: #1a2c3a; color: #555; box-shadow: none; }

        .reg-link { text-decoration: none; width: 90%; max-width: 340px; margin-top: 15px; }
        #regBtn { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--yellow), #ff9900); color: #000; border: 2px solid var(--purple); border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; animation: glow 1.5s infinite alternate; box-shadow: 0 0 15px rgba(255,204,0,0.4); }
        @keyframes glow { from { transform: scale(1); box-shadow: 0 0 10px var(--yellow); } to { transform: scale(1.02); box-shadow: 0 0 20px var(--purple); } }

        .action-row { display: flex; width: 90%; max-width: 340px; gap: 10px; margin-top: 15px; }
        #clearBtn { flex: 1; padding: 14px; background: #1a2c3a; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #instBtn { flex: 1; padding: 14px; background: #333; color: var(--yellow); border: 1px solid var(--yellow); border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-height: 85%; background: #0d1217; border: 2px solid var(--blue); border-radius: 20px; padding: 20px; z-index: 10000; overflow-y: auto; box-shadow: 0 0 50px #000; }
        .m-header { color: var(--yellow); font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .m-section { color: var(--green); font-weight: bold; margin-top: 18px; text-transform: uppercase; font-size: 13px; border-left: 3px solid var(--blue); padding-left: 8px; }
        .m-text { font-size: 12px; line-height: 1.6; color: #ccc; margin-top: 8px; padding-left: 15px; }
        .wa-link { display: block; margin-top: 15px; padding: 12px; background: #25d366; color: #000; text-align: center; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <canvas id="confettiCanvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:10001;"></canvas>

    <div id="loginOverlay">
        <div class="login-box">
            <h3 style="color:var(--yellow); margin-top:0;">PREDICTOR ULTRA ACCESS</h3>
            <input type="password" id="accessKey" placeholder="Enter Secret Key...">
            <button onclick="unlock()" style="width:100%; padding:14px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold;">ENTER SYSTEM</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()" id="langBtn">LUGHA: SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SAUTI: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON</span> <span class="c-b">SUN</span> <span class="c-g">PREDICTOR ULTRA</span></h1>
    </div>

    <div class="info-panel">
        <div><span style="color:var(--blue); font-weight:bold;" id="lText">USALAMA:</span> <span style="color:var(--green); font-weight:bold;" id="rText"> 95% UHAKIKA</span></div>
        <div style="font-size:17px; font-weight:bold; margin-top:5px;">
            <span id="roundLbl" style="color:var(--yellow);">MZUNGUKO</span> 
            <span style="color:var(--white); background: var(--red); padding: 2px 8px; border-radius: 4px;" id="activeRound">0</span> 
            <span style="color:var(--yellow);">/ 3</span>
        </div>
    </div>

    <div id="cooldownDisplay">WAIT: 10:00</div>
    <div id="warningLabel">⚠️ ONYO: WEKA HASH NA SALT KWANZA</div>

    <select id="bombSelect" onchange="updateWinRate()">
        <option value="2">💣 MABOMU 2</option>
        <option value="3" selected>💣 MABOMU 3</option>
        <option value="5">💣 MABOMU 5</option>
        <option value="7">💣 MABOMU 7</option>
    </select>

    <input type="text" id="hashIn" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltIn" placeholder="Salt ya Raundi Iliyopita...">

    <div id="loaderWrap" style="width:90%; height:8px; background:#000; display:none; margin-bottom:15px; border-radius:10px; overflow:hidden; border: 1px solid #333;"><div id="loaderBar" style="height:100%; width:0%; background:linear-gradient(90deg, var(--purple), var(--blue)); transition: 0.05s;"></div></div>

    <div class="grid" id="gameGrid"></div>

    <button id="mainBtn" onclick="startAnalysis()">PATA SIGNAL 🚀</button>

    <a href="https://1win.com/registration?promo=MOON26" target="_blank" class="reg-link">
        <button id="regBtn">JISAJILI NA 1WIN HAPA (BONUS 500%)</button>
    </a>
    
    <div class="action-row">
        <button id="clearBtn" onclick="autoClear()">🔄 AUTO CLEAR</button>
        <button id="instBtn" onclick="toggleModal()">💡 MAELEKEZO</button>
    </div>

    <div id="modal">
        <div id="modalTitle" class="m-header">MWONGOZO WA USHINDI</div>
        <div id="modalContent"></div>
        <button id="closeBtn" onclick="toggleModal()" style="width:100%; margin-top:20px; padding:15px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">NIMELEWA / CLOSE</button>
    </div>

    <script>
        let roundIdx = parseInt(localStorage.getItem('predictorRound')) || 0;
        let currentLang = 'sw';
        let muted = false;
        let isCooldownActive = false;
        const MAX_ROUNDS = 3;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Mfumo mpya wa sauti wenye nguvu (Volume 0.5 badala ya 0.1)
        function playSound(freq, type, duration, vol = 0.5) {
            if (muted) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const translations = {
            sw: {
                lang: "LUGHA: SW", sound: "SAUTI: ", lText: "USALAMA:", secureText: " UHAKIKA", round: "MZUNGUKO",
                btn: "PATA SIGNAL 🚀", instBtn: "💡 MAELEKEZO", wait: "PUMZIKA: ", cdBtn: "MAPUMZIKO (MIN 10)",
                mHeader: "MWONGOZO WA USHINDI V12.0", mClose: "NIMELEWA", warn: "⚠️ ONYO: WEKA HASH NA SALT KWANZA",
                reg: "JISAJILI NA 1WIN HAPA (BONUS 500%)", hashPh: "Paste Hash Hapa...", saltPh: "Paste Salt Hapa...",
                bombs: ["💣 MABOMU 2", "💣 MABOMU 3", "💣 MABOMU 5", "💣 MABOMU 7"],
                mBody: `
                    <div class="m-section">1. MATUMIZI YA BATANI</div>
                    <ul class="m-text">
                        <li><b>PATA SIGNAL:</b> Inachakata data na kutoa nyota 3 salama.</li>
                        <li><b>AUTO CLEAR:</b> Inasafisha gridi lakini HAIFUTI raundi zako.</li>
                    </ul>
                    <div class="m-section">2. HATUA ZA KUPATA MATOKEO</div>
                    <ul class="m-text">
                        <li>Copy <b>'Next Round Hash'</b> na <b>'Last Round Salt'</b> kutoka 1Win Provably Fair.</li>
                        <li>Paste hapa kwenye App na ubonyeze Pata Signal.</li>
                    </ul>
                    <div class="m-section">3. JISAJILI NA PROMO CODE</div>
                    <ul class="m-text">
                        <li>Ni LAZIMA kutumia Promo Code: <b>MOON26</b> wakati wa kujisajili 1Win ili akaunti yako iunganishe na seva yetu.</li>
                    </ul>
                    <hr style="border:0.5px solid #333; margin-top:15px;">
                    <p style="font-size:10px; color:var(--yellow); text-align:center;">Kwa maelekezo zaidi fuata hii chaneli:</p>
                    <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" class="wa-link">FOLLOW MOON SUN PREDICTOR WHATSAPP</a>
                `
            },
            en: {
                lang: "LANG: EN", sound: "SOUND: ", lText: "SECURITY:", secureText: " SECURE", round: "ROUND",
                btn: "GET SIGNAL 🚀", instBtn: "💡 INSTRUCTIONS", wait: "COOLDOWN: ", cdBtn: "COOLDOWN (10 MIN)",
                mHeader: "WINNING GUIDE V12.0", mClose: "I UNDERSTAND", warn: "⚠️ WARNING: ENTER HASH & SALT FIRST",
                reg: "REGISTER ON 1WIN HERE (500% BONUS)", hashPh: "Paste Hash Here...", saltPh: "Paste Salt Here...",
                bombs: ["💣 2 BOMBS", "💣 3 BOMBS", "💣 5 BOMBS", "💣 7 BOMBS"],
                mBody: `
                    <div class="m-section">1. BUTTON USAGE</div>
                    <ul class="m-text">
                        <li><b>GET SIGNAL:</b> Processes data to show 3 safe stars.</li>
                    </ul>
                    <div class="m-section">2. HOW TO WIN</div>
                    <ul class="m-text">
                        <li>Copy <b>'Next Round Hash'</b> and <b>'Last Round Salt'</b> from 1Win.</li>
                    </ul>
                    <div class="m-section">3. PROMO CODE</div>
                    <ul class="m-text">
                        <li>MUST use Promo Code: <b>MOON26</b> for 100% accuracy.</li>
                    </ul>
                    <hr style="border:0.5px solid #333; margin-top:15px;">
                    <p style="font-size:10px; color:var(--yellow); text-align:center;">For more instructions, follow this channel:</p>
                    <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" class="wa-link">FOLLOW MOON SUN PREDICTOR WHATSAPP</a>
                `
            }
        };

        function unlock() { 
            if(document.getElementById('accessKey').value === 'Mr winner123') { 
                document.getElementById('loginOverlay').style.display = 'none'; 
                initAudio(); 
                playSound(600, 'triangle', 0.4); 
                checkExistingCD(); 
            } 
        }

        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); playSound(400, 'sine', 0.1); refreshUI(); }
        function toggleMute() { muted = !muted; if(!muted) playSound(500, 'sine', 0.1); refreshUI(); }

        function updateWinRate() {
            const b = document.getElementById('bombSelect').value;
            let rate = b === "2" ? "98%" : b === "3" ? "95%" : b === "5" ? "90%" : "85%";
            document.getElementById('rText').innerText = " " + rate + translations[currentLang].secureText;
            document.getElementById('rText').style.color = b === "7" ? "var(--red)" : b === "5" ? "var(--yellow)" : "var(--green)";
            playSound(300, 'sine', 0.05);
        }

        function refreshUI() {
            const t = translations[currentLang];
            document.getElementById('langBtn').innerText = t.lang; 
            document.getElementById('volBtn').innerText = t.sound + (muted ? "OFF" : "ON");
            document.getElementById('lText').innerText = t.lText; 
            document.getElementById('roundLbl').innerText = t.round;
            document.getElementById('instBtn').innerText = t.instBtn; 
            document.getElementById('modalTitle').innerText = t.mHeader;
            document.getElementById('closeBtn').innerText = t.mClose; 
            document.getElementById('warningLabel').innerText = t.warn;
            document.getElementById('regBtn').innerText = t.reg;
            document.getElementById('modalContent').innerHTML = t.mBody;
            document.getElementById('hashIn').placeholder = t.hashPh; 
            document.getElementById('saltIn').placeholder = t.saltPh;
            const bSelect = document.getElementById('bombSelect');
            for(let i=0; i<4; i++) bSelect.options[i].text = t.bombs[i];
            updateWinRate();
            if(!isCooldownActive) { document.getElementById('mainBtn').innerText = (roundIdx >= MAX_ROUNDS) ? t.cdBtn : t.btn; document.getElementById('activeRound').innerText = roundIdx; }
        }

        function autoClear() { 
            if(isCooldownActive) return; 
            playSound(200, 'square', 0.1); 
            const cells = document.querySelectorAll('.cell'); 
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell shaded'; }); 
            document.getElementById('hashIn').value = ""; 
            document.getElementById('saltIn').value = ""; 
        }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-' + i; grid.appendChild(d); }

        function startAnalysis() {
            if(isCooldownActive) return;
            const h = document.getElementById('hashIn').value; const s = document.getElementById('saltIn').value;
            if(!h || !s) { 
                document.getElementById('warningLabel').style.display = 'block'; 
                playSound(150, 'square', 0.3, 0.8);
                return; 
            }
            document.getElementById('warningLabel').style.display = 'none';
            playSound(400, 'triangle', 0.1);
            const btn = document.getElementById('mainBtn'); const bar = document.getElementById('loaderBar');
            btn.disabled = true; document.getElementById('loaderWrap').style.display = 'block';
            let p = 0;
            const timer = setInterval(() => { 
                p += 5; bar.style.width = p + "%"; 
                if(p % 20 === 0) playSound(800, 'sine', 0.05, 0.2);
                if(p >= 100) { clearInterval(timer); runLogic(h, s); } 
            }, 50); 
        }

        function runLogic(h, s) {
            roundIdx++; localStorage.setItem('predictorRound', roundIdx); document.getElementById('activeRound').innerText = roundIdx;
            const cells = document.querySelectorAll('.cell'); cells.forEach(c => { c.innerHTML = ''; c.className = 'cell shaded'; });
            let seedStr = h + s + roundIdx + Date.now();
            let seed = 0; for(let i=0; i<seedStr.length; i++) { seed = ((seed << 5) - seed) + seedStr.charCodeAt(i); seed |= 0; }
            let pos = Array.from({length: 25}, (_, i) => i);
            for (let i = pos.length - 1; i > 0; i--) { let x = Math.sin(seed++) * 10000; let r = x - Math.floor(x); let j = Math.floor(r * (i + 1)); [pos[i], pos[j]] = [pos[j], pos[i]]; }
            let safes = pos.slice(0, 3);
            safes.forEach((idx, i) => { 
                setTimeout(() => { 
                    const c = document.getElementById('cell-' + idx); 
                    c.innerHTML = '⭐'; 
                    c.className = 'cell safe'; 
                    playSound(800 + (i*200), 'triangle', 0.3, 0.6); 
                }, i * 400); 
            });
            document.getElementById('loaderWrap').style.display = 'none';
            if(roundIdx >= MAX_ROUNDS) { setTimeout(() => { playSound(200, 'sawtooth', 0.5, 0.4); const endTime = Date.now() + 600000; localStorage.setItem('predictorCooldown', endTime); startCD(600); }, 1500); } else { document.getElementById('mainBtn').disabled = false; }
        }

        function checkExistingCD() { const endTime = localStorage.getItem('predictorCooldown'); if(endTime) { const rem = Math.floor((parseInt(endTime) - Date.now()) / 1000); if(rem > 0) startCD(rem); else localStorage.removeItem('predictorCooldown'); } }
        function startCD(sec) { 
            isCooldownActive = true; 
            const timerEl = document.getElementById('cooldownDisplay'); 
            const btn = document.getElementById('mainBtn'); 
            btn.disabled = true; 
            timerEl.style.display = 'block'; 
            const cd = setInterval(() => { 
                let m = Math.floor(sec/60); let s = sec%60; 
                timerEl.innerText = (currentLang === 'sw' ? "PUMZIKA: " : "WAIT: ") + m + ":" + (s < 10 ? "0" : "") + s; 
                btn.innerText = translations[currentLang].cdBtn; 
                if(sec <= 0) { 
                    clearInterval(cd); roundIdx = 0; isCooldownActive = false; 
                    localStorage.removeItem('predictorRound'); localStorage.removeItem('predictorCooldown'); 
                    timerEl.style.display = 'none'; btn.disabled = false; autoClear(); refreshUI(); 
                    playSound(1000, 'sine', 0.5, 0.7);
                } 
                sec--; 
            }, 1000); 
        }
        function toggleModal() { const m = document.getElementById('modal'); m.style.display = (m.style.display === 'block' ? 'none' : 'block'); playSound(400, 'sine', 0.1); }
        window.onload = refreshUI;
    </script>
</body>
</html>
