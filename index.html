<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V10.5 ULTRA</title>
    <style>
        :root { --bg: #030508; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; }

        #loginOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 85%; max-width: 300px; }

        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 10px; z-index: 1000; }
        .btn-mini { background: rgba(0,123,255,0.1); color: var(--blue); border: 1px solid var(--blue); padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .header-section { text-align: center; margin-top: 55px; }
        .app-name { font-size: 22px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .c-y { color: var(--yellow); } .c-b { color: var(--blue); } .c-g { color: var(--green); }

        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 90%; max-width: 340px; text-align: center; border: 1px solid #1a2c3a; }
        #cooldownDisplay { color: var(--red); font-size: 15px; font-weight: 900; display: none; margin-bottom: 10px; border: 1px solid var(--red); padding: 6px 18px; border-radius: 20px; animation: blinker 1s infinite; }
        
        #warningLabel { color: var(--red); font-size: 12px; font-weight: bold; display: none; margin-bottom: 5px; text-align: center; animation: blinker 0.8s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid #1b262f; transition: 0.2s; }
        .cell.safe { border: 2.5px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0,255,136,0.2); transform: scale(1.05); }

        input, select { width: 90%; max-width: 340px; padding: 13px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 10px; margin-bottom: 10px; text-align: center; outline: none; font-size: 13px; font-weight: bold; }
        #mainBtn { width: 90%; max-width: 340px; padding: 18px; background: linear-gradient(to right, #007bff, #0052ad); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 15px; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        #mainBtn:disabled { background: #1a2c3a; color: #555; box-shadow: none; }

        .action-row { display: flex; width: 90%; max-width: 340px; gap: 10px; margin-top: 15px; }
        #clearBtn { flex: 2; padding: 14px; background: #1a2c3a; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #instBtn { flex: 1.5; padding: 14px; background: var(--yellow); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-height: 90%; background: #0d1217; border: 2px solid var(--blue); border-radius: 20px; padding: 15px; z-index: 10000; overflow-y: auto; }
        .m-header { color: var(--yellow); font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .m-section { color: var(--blue); font-weight: bold; margin-top: 15px; text-transform: uppercase; font-size: 14px; }
        .m-text { font-size: 12px; line-height: 1.6; color: #ccc; margin-top: 5px; list-style: none; padding: 0; }
        .m-text li { margin-bottom: 5px; }
        .m-link-note { color: var(--yellow); font-size: 11px; font-weight: bold; text-align: center; margin-top: 15px; text-transform: uppercase; }
        .m-link { color: var(--green); text-decoration: none; font-weight: bold; display: block; margin-top: 5px; padding: 12px; background: rgba(0,255,136,0.1); border-radius: 8px; text-align: center; font-size: 13px; border: 1px dashed var(--green); }
        
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10001; }
    </style>
</head>
<body>

    <canvas id="confettiCanvas"></canvas>

    <div id="loginOverlay">
        <div class="login-box">
            <h3 style="color:var(--yellow); margin-top:0;">ACCESS KEY</h3>
            <input type="password" id="accessKey" placeholder="Enter Key...">
            <button onclick="unlock()" style="width:100%; padding:14px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold;">LOGIN</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()" id="langBtn">LANG: SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SOUND: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON</span> <span class="c-b">SUN</span> <span class="c-g">PREDICTOR</span></h1>
    </div>

    <div class="info-panel">
        <div><span style="color:var(--blue); font-weight:bold;" id="lText">KIWANGO CHA</span> <span style="color:var(--yellow); font-weight:bold;" id="rText"> USHINDI: 99.8%</span></div>
        <div style="font-size:17px; font-weight:bold; margin-top:5px;">
            <span id="roundLbl" style="color:var(--yellow);">MZUNGUKO</span> 
            <span style="color:var(--red);" id="activeRound">0</span> 
            <span style="color:var(--yellow);">/ 5</span>
        </div>
    </div>

    <div id="cooldownDisplay">WAIT: 10:00</div>
    <div id="warningLabel">⚠️ ONYO: WEKA HASH NA SALT KWANZA</div>

    <select id="bombCount" onchange="updateRate()"></select>
    <input type="text" id="hashIn" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltIn" placeholder="Salt ya Raundi Iliyopita...">

    <div id="loaderWrap" style="width:90%; height:6px; background:#000; display:none; margin-bottom:15px; border-radius:10px; overflow:hidden;"><div id="loaderBar" style="height:100%; width:0%; background:var(--green); transition: 0.05s;"></div></div>

    <div class="grid" id="gameGrid"></div>

    <button id="mainBtn" onclick="startAnalysis()">PATA SIGNAL 🚀</button>
    
    <div class="action-row">
        <button id="clearBtn" onclick="safeClear()">🔄 AUTO CLEAR</button>
        <button id="instBtn" onclick="toggleModal()">MAELEKEZO</button>
    </div>

    <div id="modal">
        <div id="modalTitle" class="m-header">MAELEKEZO YA KINA</div>
        <div id="modalContent"></div>
        <button id="closeBtn" onclick="toggleModal()" style="width:100%; margin-top:20px; padding:15px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">FUNGA</button>
    </div>

    <script>
        let roundIdx = parseInt(localStorage.getItem('predictorRound')) || 0;
        let currentLang = 'sw';
        let muted = false;
        let isCooldownActive = false;
        const MAX_ROUNDS = 5;
        const wsLink = "https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let confetti = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function createConfetti() {
            for(let i=0; i<150; i++) {
                confetti.push({
                    x: canvas.width/2, y: canvas.height,
                    dir: Math.random()*Math.PI - Math.PI,
                    speed: Math.random()*15+10,
                    color: `hsl(${Math.random()*360}, 100%, 50%)`,
                    size: Math.random()*6+3,
                    life: 1
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confetti.forEach((p, i) => {
                p.x += Math.cos(p.dir) * p.speed;
                p.y += Math.sin(p.dir) * p.speed + 3;
                p.life -= 0.008;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                if(p.life <= 0) confetti.splice(i, 1);
            });
            if(confetti.length > 0) requestAnimationFrame(animateConfetti);
        }

        function playSound(freq, type, duration, vol = 0.1) {
            if (muted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playJackpot() {
            if (muted) return;
            const melody = [523, 659, 783, 1046, 1318, 1567];
            melody.forEach((f, i) => { setTimeout(() => playSound(f, 'sine', 1.2, 0.2), i * 120); });
            createConfetti();
        }

        const translations = {
            sw: {
                lText: "KIWANGO CHA", rText: " USHINDI: ", round: "MZUNGUKO",
                btn: "PATA SIGNAL 🚀", instBtn: "MAELEKEZO", bombTxt: "MABOMU", wait: "SUBIRI: ", cdBtn: "MUDA WA KUSUBIRI",
                mHeader: "MAELEKEZO YA KINA", mClose: "FUNGA", warn: "⚠️ ONYO: WEKA HASH NA SALT KWANZA",
                hashPh: "Hash ya Raundi Iliyopita...", saltPh: "Salt ya Raundi Iliyopita...",
                linkNote: "KWA MAELEKEZO ZAIDI FUATA HII CHANELI", linkBtn: "BONYEZA HAPA KUJIUNGA NA CHANELI YA WHATSAPP",
                mBody: `
                <div class="m-section">1. MBINU YA USHINDI 5/5</div>
                <ul class="m-text">
                    <li>• <b>BOMU 7:</b> Inatoa nyota 2 tu za usalama.</li>
                    <li>• <b>BOMU 5:</b> Inatoa nyota 3 tu za usalama.</li>
                    <li>• <b>HARAKA:</b> Copy na Paste data haraka ndani ya sekunde 20.</li>
                </ul>`
            },
            en: {
                lText: "WINNING", rText: " RATE: ", round: "ROUND",
                btn: "GET SIGNAL 🚀", instBtn: "INSTRUCTIONS", bombTxt: "BOMBS", wait: "WAIT: ", cdBtn: "COOLDOWN ACTIVE",
                mHeader: "DETAILED INSTRUCTIONS", mClose: "CLOSE", warn: "⚠️ WARNING: ENTER HASH & SALT FIRST",
                hashPh: "Previous Round Hash...", saltPh: "Previous Round Salt...",
                linkNote: "FOR MORE INSTRUCTIONS FOLLOW THIS CHANNEL", linkBtn: "CLICK HERE TO JOIN WHATSAPP CHANNEL",
                mBody: `
                <div class="m-section">1. 5/5 WINNING STRATEGY</div>
                <ul class="m-text">
                    <li>• <b>7 BOMBS:</b> Provides only 2 safe stars.</li>
                    <li>• <b>5 BOMBS:</b> Provides only 3 safe stars.</li>
                    <li>• <b>SPEED:</b> Copy and Paste data within 20 seconds.</li>
                </ul>`
            }
        };

        function unlock() { if(document.getElementById('accessKey').value === 'Mr winner123') { document.getElementById('loginOverlay').style.display = 'none'; if (audioCtx.state === 'suspended') audioCtx.resume(); checkExistingCD(); } }
        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); document.getElementById('langBtn').innerText = "LANG: " + currentLang.toUpperCase(); refreshUI(); }
        function toggleMute() { muted = !muted; document.getElementById('volBtn').innerText = "SOUND: " + (muted ? "OFF" : "ON"); }
        
        function refreshUI() {
            const t = translations[currentLang];
            document.getElementById('lText').innerText = t.lText;
            document.getElementById('roundLbl').innerText = t.round;
            document.getElementById('instBtn').innerText = t.instBtn;
            document.getElementById('modalTitle').innerText = t.mHeader;
            document.getElementById('closeBtn').innerText = t.mClose;
            document.getElementById('warningLabel').innerText = t.warn;
            document.getElementById('modalContent').innerHTML = t.mBody + `<div class="m-link-note">${t.linkNote}</div><a href="${wsLink}" class="m-link" target="_blank">${t.linkBtn}</a>`;
            document.getElementById('hashIn').placeholder = t.hashPh;
            document.getElementById('saltIn').placeholder = t.saltPh;
            
            const select = document.getElementById('bombCount');
            const val = select.value || "3";
            select.innerHTML = '';
            [2, 3, 5, 7].forEach(n => {
                const opt = document.createElement('option');
                opt.value = n; opt.text = `${t.bombTxt} ${n}`;
                if(n == val) opt.selected = true;
                select.appendChild(opt);
            });
            
            if(!isCooldownActive) {
                document.getElementById('mainBtn').innerText = (roundIdx >= MAX_ROUNDS) ? t.cdBtn : t.btn;
                document.getElementById('activeRound').innerText = roundIdx;
            }
            updateRate();
        }

        function safeClear() {
            const endTime = localStorage.getItem('predictorCooldown');
            if(endTime && (parseInt(endTime) > Date.now())) {
                alert(currentLang === 'sw' ? "Huwezi kusafisha wakati muda wa mapumziko bado upo!" : "Cannot clear while cooldown is active!");
                return;
            }
            roundIdx = 0;
            localStorage.setItem('predictorRound', 0);
            location.reload();
        }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) {
            const d = document.createElement('div'); d.className = 'cell';
            grid.appendChild(d);
        }

        function startAnalysis() {
            if(isCooldownActive) return;
            const h = document.getElementById('hashIn').value;
            const s = document.getElementById('saltIn').value;
            if(!h || !s) { 
                document.getElementById('warningLabel').style.display = 'block';
                playSound(200, 'sawtooth', 0.2);
                return; 
            }
            document.getElementById('warningLabel').style.display = 'none';
            const btn = document.getElementById('mainBtn');
            const bar = document.getElementById('loaderBar');
            btn.disabled = true;
            document.getElementById('loaderWrap').style.display = 'block';
            
            let p = 0;
            const timer = setInterval(() => {
                p += 5; bar.style.width = p + "%";
                if(p % 20 === 0) playSound(400, 'square', 0.05);
                if(p >= 100) { clearInterval(timer); runLogic(h, s); }
            }, 25); 
        }

        function runLogic(h, s) {
            roundIdx++;
            localStorage.setItem('predictorRound', roundIdx);
            document.getElementById('activeRound').innerText = roundIdx;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            const bombs = parseInt(document.getElementById('bombCount').value);
            let starCount = 4; // Default
            if (bombs === 7) starCount = 2;
            else if (bombs === 5) starCount = 3;

            let seed = 0;
            let str = h + s + roundIdx + "ULTRA_V10.5_STABLE_5/5";
            for(let i=0; i<str.length; i++) seed = ((seed << 5) - seed) + str.charCodeAt(i);
            
            let spots = [];
            let attempt = 0;
            while(spots.length < starCount && attempt < 100) {
                // Advanced entropy using sine for better distribution
                let pseudo = Math.abs(Math.sin(seed + attempt) * 10000);
                let pos = Math.floor(pseudo % 25);
                if(!spots.includes(pos)) spots.push(pos);
                attempt++;
            }

            spots.forEach((idx, i) => {
                setTimeout(() => {
                    cells[idx].innerHTML = '⭐';
                    cells[idx].classList.add('safe');
                    playSound(600 + (i*100), 'sine', 0.1);
                }, i * 150);
            });

            document.getElementById('loaderWrap').style.display = 'none';
            document.getElementById('hashIn').value = "";
            document.getElementById('saltIn').value = "";
            
            if(roundIdx >= MAX_ROUNDS) {
                setTimeout(() => {
                    playJackpot();
                    const endTime = Date.now() + 600000;
                    localStorage.setItem('predictorCooldown', endTime);
                    startCD(600);
                }, 800);
            } else {
                setTimeout(() => { document.getElementById('mainBtn').disabled = false; }, 800);
            }
        }

        function checkExistingCD() {
            const endTime = localStorage.getItem('predictorCooldown');
            if(endTime) {
                const remaining = Math.floor((parseInt(endTime) - Date.now()) / 1000);
                if(remaining > 0) startCD(remaining);
                else localStorage.removeItem('predictorCooldown');
            }
        }

        function startCD(sec) {
            isCooldownActive = true;
            const timerEl = document.getElementById('cooldownDisplay');
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = translations[currentLang].cdBtn;
            timerEl.style.display = 'block';
            
            const cd = setInterval(() => {
                let m = Math.floor(sec/60); let s = sec%60;
                timerEl.innerText = translations[currentLang].wait + m + ":" + (s < 10 ? "0" : "") + s;
                if(sec <= 0) {
                    clearInterval(cd); roundIdx = 0;
                    isCooldownActive = false;
                    localStorage.removeItem('predictorRound');
                    localStorage.removeItem('predictorCooldown');
                    timerEl.style.display = 'none';
                    btn.disabled = false; refreshUI();
                }
                sec--;
            }, 1000);
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'block' ? 'none' : 'block');
        }

        function updateRate() { 
            const b = parseInt(document.getElementById('bombCount').value);
            let rate = "99.8%";
            if (b >= 7) rate = "98.5%";
            document.getElementById('rText').innerText = translations[currentLang].rText + rate; 
        }
        window.onload = refreshUI;
    </script>
</body>
</html>
