<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.0</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">

    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; position: relative; min-height: 100vh; overflow-x: hidden; }
        
        /* Background Layer - Hapa ndipo picha inakaa bila kuzoomiwa */
        #bgLayer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background-repeat: no-repeat; background-position: center; 
            background-size: contain; /* Hii inahakikisha picha haizoomiwi */
            transition: 0.3s; opacity: 0.1; 
            background-image: url('https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png');
        }

        /* Controls Panel (Top Left) */
        .controls { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 1000; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 8px; border: 0.5px solid var(--blue); }
        .c-row { display: flex; align-items: center; gap: 5px; }
        .m-btn { background: #12181f; border: 0.5px solid var(--blue); color: white; padding: 3px 6px; border-radius: 4px; font-size: 8px; cursor: pointer; }
        .txt { font-size: 7px; color: var(--yellow); font-weight: bold; text-transform: uppercase; }
        input[type="range"] { width: 50px; cursor: pointer; }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .title-container { text-align: center; margin-bottom: 10px; margin-top: 55px; }
        .main-title { font-size: 22px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-title { font-size: 14px; font-weight: bold; margin-top: 5px; }
        .color-blue { color: var(--blue); } .color-yellow { color: var(--yellow); } .color-green { color: var(--green); }

        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 52px; height: 52px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; transition: 0.3s; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.1); }
        
        input[type="text"], select { width: 100%; max-width: 320px; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 8px; }
        button#mainBtn { width: 100%; max-width: 340px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #instBtn { position: fixed; bottom: 20px; right: 20px; background: var(--yellow); color: #000; padding: 10px 15px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>

    <div id="bgLayer"></div>

    <div class="controls">
        <div class="c-row">
            <span class="txt">SND:</span>
            <button class="m-btn" id="mBtn" onclick="toggleM()">ON</button>
            <select id="sPick" class="m-btn" onchange="upS()">
                <option value="https://www.soundjay.com/buttons/sounds/button-37a.mp3">S1</option>
                <option value="https://www.soundjay.com/buttons/sounds/button-09a.mp3">S2</option>
                <option value="https://www.soundjay.com/buttons/sounds/button-20.mp3">S3</option>
            </select>
        </div>
        <div class="c-row">
            <span class="txt">THEME:</span>
            <button class="m-btn" onclick="nxtT()">NEXT</button>
            <button class="m-btn" onclick="document.getElementById('fileInp').click()">UPL</button>
            <input type="file" id="fileInp" style="display:none" accept="image/*" onchange="upImg(event)">
        </div>
        <div class="c-row">
            <span class="txt">VIS:</span>
            <input type="range" min="0" max="100" value="10" oninput="upOp(this.value)">
        </div>
    </div>

    <div id="loginScreen">
        <h2 class="color-blue">MOON SUN ACCESS</h2>
        <input type="password" id="accessKey" placeholder="Enter Access Key">
        <button onclick="checkK()" style="width:180px; padding: 10px; background: var(--blue); border: none; color: #fff; font-weight: bold;">LOGIN</button>
    </div>

    <div class="title-container">
        <h2 class="main-title"><span class="color-blue">MOON</span> <span class="color-yellow">SUN</span> <span class="color-green">PREDICTOR V9.0</span></h2>
        <div class="sub-title"><span class="color-green">MINES</span> <span class="color-blue">PREDICTOR</span> <span class="color-yellow">(1WIN)</span></div>
    </div>

    <div class="info-panel">
        <div class="win-rate">KIWANGO CHA USHINDI: 96%</div>
        <div>MZUNGUKO: <span id="roundCounter" style="color:var(--yellow);">0</span> / 4</div>
    </div>

    <select id="bombSelect">
        <option value="2">2 BOMBS (96%)</option>
        <option value="3">3 BOMBS (95%)</option>
        <option value="5">5 BOMBS (85%)</option>
    </select>
    
    <input type="text" id="hashInput" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltInput" placeholder="Salt ya Raundi Iliyopita...">

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="processS()">PATA SIGNAL 🚀</button>

    <div id="instBtn" onclick="alert('Kiongozi, tumia Hash na Salt za raundi iliyopita kupata matokeo ya sasa.')">MAELEKEZO</div>

    <script>
        let muted = false;
        let tI = 0;
        const themes = [
            'https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png',
            'https://i.ibb.co/XW8FpYV/bg-premium-1.png',
            'none'
        ];

        let sfx = new Audio(document.getElementById('sPick').value);

        function checkK() {
            if(document.getElementById('accessKey').value === "Mr winner123") {
                document.getElementById('loginScreen').style.display = 'none';
                if(!muted) sfx.play();
            } else { alert("Key si sahihi!"); }
        }

        function toggleM() { muted = !muted; document.getElementById('mBtn').innerText = muted ? "OFF" : "ON"; document.getElementById('mBtn').style.color = muted ? "red" : "lime"; }
        function upS() { sfx.src = document.getElementById('sPick').value; if(!muted) sfx.play(); }
        function nxtT() { tI = (tI + 1) % themes.length; const b = document.getElementById('bgLayer'); b.style.backgroundImage = themes[tI] === 'none' ? 'none' : `url('${themes[tI]}')`; }
        function upOp(v) { document.getElementById('bgLayer').style.opacity = v / 100; }
        
        function upImg(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('bgLayer').style.backgroundImage = `url('${ev.target.result}')`;
                }
                reader.readAsDataURL(file);
            }
        }

        const g = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            g.appendChild(c);
        }

        function processS() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            if(!h || !s) return;
            if(!muted) sfx.play();
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
            setTimeout(() => {
                let safe = [0, 6, 12, 18, 24]; // Algorithm Logic
                safe.forEach(p => { cells[p].innerHTML = '⭐'; cells[p].classList.add('safe'); });
                document.getElementById('hashInput').value = ""; document.getElementById('saltInput').value = "";
            }, 600);
        }
    </script>
</body>
</html>
