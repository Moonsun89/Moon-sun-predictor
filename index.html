<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V12.5 | ULTRA</title>
    <style>
        :root { --bg: #020406; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; --border: #1b262f; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; min-height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 80%; max-width: 300px; }

        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 8px; z-index: 1000; }
        .btn-mini { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 5px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .header-section { text-align: center; margin-top: 35px; margin-bottom: 5px; }
        .app-name { font-size: 20px; font-weight: 900; margin: 0; letter-spacing: 1px; }
        .c-y { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); } 
        .c-b { color: var(--blue); text-shadow: 0 0 8px var(--blue); }
        .sub-title { font-size: 9px; color: var(--green); font-weight: bold; margin-top: 2px; text-transform: uppercase; }

        .info-panel { background: #0a0e14; padding: 8px; border-radius: 10px; margin: 5px 0; width: 92%; max-width: 350px; text-align: center; border: 1px solid #1a2c3a; }
        #cooldownDisplay { color: var(--red); font-size: 14px; font-weight: 900; display: none; margin-bottom: 5px; border: 2px solid var(--red); padding: 5px; border-radius: 8px; animation: blinker 1s infinite; background: rgba(255,51,51,0.1); width: 92%; }
        
        @keyframes blinker { 50% { opacity: 0.3; } }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #000; padding: 10px; border-radius: 12px; border: 2px solid var(--blue); margin-bottom: 8px; box-shadow: 0 0 15px rgba(0,123,255,0.2); }
        .cell { width: 42px; height: 42px; background: #0d1218; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #2a3b4a; transition: 0.3s; position: relative; }
        
        /* Mipaka iliyoboreshwa ili kuonekana vizuri */
        .cell.safe { border: 2.5px solid var(--green) !important; box-shadow: 0 0 12px var(--green); background: rgba(0,255,136,0.2); transform: scale(1.05); z-index: 2; }
        .cell.shaded { border: 1px solid #2a3b4a; }

        input, select { width: 92%; max-width: 350px; padding: 8px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 8px; margin-bottom: 6px; text-align: center; outline: none; font-size: 12px; font-weight: bold; box-sizing: border-box; }
        #bombSelect { color: var(--yellow); border-color: var(--yellow); }

        #mainBtn { width: 92%; max-width: 350px; padding: 12px; background: linear-gradient(135deg, #007bff, #0052ad); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        #mainBtn:disabled { background: #1a2c3a; color: #555; box-shadow: none; }

        #regBtn { width: 92%; max-width: 350px; padding: 12px; background: linear-gradient(45deg, var(--yellow), #ff9900); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; margin-top: 5px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--yellow); } to { box-shadow: 0 0 15px var(--purple); } }

        .action-row { display: flex; width: 92%; max-width: 350px; gap: 8px; margin-top: 5px; }
        #clearBtn, #instBtn { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 10px; border: none; cursor: pointer; }
        #clearBtn { background: #1a2c3a; color: white; }
        #instBtn { background: #222; color: var(--yellow); border: 1px solid var(--yellow); }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-height: 85%; background: #0d1217; border: 2px solid var(--blue); border-radius: 15px; padding: 15px; z-index: 10000; overflow-y: auto; box-sizing: border-box; }
        .m-header { color: var(--yellow); font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; text-align: center; }
        
        .wa-btn { display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 12px; padding: 12px; background: linear-gradient(45deg, #25d366, #128c7e); color: #fff; text-align: center; border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 11px; animation: pulse-wa 2s infinite; border: 1px solid #fff; box-sizing: border-box; }
        @keyframes pulse-wa { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--yellow); font-size:18px;">MOON SUN PRO</h2>
            <input type="password" id="accessKey" placeholder="Secret Key..." style="margin-top:10px;">
            <button onclick="unlock()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">AUTHORIZE</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()" id="langBtn">LUGHA: SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SAUTI: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON SUN</span> <span class="c-b">PREDICTOR</span> <span class="c-y">V12.5</span></h1>
        <div class="sub-title">Mines 1win predictor</div>
    </div>

    <div class="info-panel">
        <div style="font-size:11px;"><span id="lText">USALAMA:</span> <span id="rText" style="font-weight:900;">98% UHAKIKA</span></div>
        <div style="font-size:14px; font-weight:bold; margin-top:3px;">
            <span id="roundLbl" style="color:var(--yellow);">RAUNDI</span> 
            <span style="color:#fff; background:var(--red); padding:1px 8px; border-radius:4px; margin:0 4px;" id="activeRound">0</span> 
            <span style="color:var(--yellow);">/ 3</span>
        </div>
    </div>

    <div id="cooldownDisplay">WAIT: 10:00</div>

    <select id="bombSelect" onchange="updateWinRate()">
        <option value="2">💣 MABOMU 2</option>
        <option value="3" selected>💣 MABOMU 3</option>
        <option value="5">💣 MABOMU 5</option>
    </select>

    <input type="text" id="hashIn" placeholder="Paste Hash ya Raundi Ijayo...">
    <input type="text" id="saltIn" placeholder="Paste Salt ya Raundi Iliyopita...">

    <div id="loaderWrap" style="width:92%; height:4px; background:#111; display:none; margin-bottom:5px; border-radius:10px; overflow:hidden;"><div id="loaderBar" style="height:100%; width:0%; background:var(--blue); transition: 0.1s;"></div></div>

    <div class="grid" id="gameGrid"></div>

    <button id="mainBtn" onclick="startAnalysis()">PATA SIGNAL 🚀</button>

    <a href="https://1win.com/registration?promo=MOON26" target="_blank" style="text-decoration:none; width:100%; display:flex; justify-content:center;">
        <button id="regBtn">JISAJILI 1WIN HAPA (PROMO: MOON26)</button>
    </a>
    
    <div class="action-row">
        <button id="clearBtn" onclick="autoClear()">🔄 AUTO CLEAR</button>
        <button id="instBtn" onclick="toggleModal()">💡 MAELEKEZO</button>
    </div>

    <div id="modal">
        <div id="modalTitle" class="m-header">MWONGOZO WA USHINDI</div>
        <div id="modalContent"></div>
        <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" target="_blank" class="wa-btn" id="waLinkBtn">KWA MAELEKEZO ZAIDI FUATA HII CHANELI</a>
        <button id="closeModalBtn" onclick="toggleModal()" style="width:100%; margin-top:10px; padding:10px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold;">FUNGA</button>
    </div>

    <script>
        let roundIdx = parseInt(localStorage.getItem('predictorRound')) || 0;
        let currentLang = 'sw';
        let muted = false;
        let isCooldownActive = false;
        const MAX_ROUNDS = 3;

        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(freq, type, duration, vol = 0.3) { if (muted) return; initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); }
        function triggerVibrate(ms = 50) { if (navigator.vibrate) navigator.vibrate(ms); }

        const translations = {
            sw: { lang: "LUGHA: SW", sound: "SAUTI: ", lText: "USALAMA:", secure: " UHAKIKA", round: "RAUNDI", btn: "PATA SIGNAL 🚀", instBtn: "💡 MAELEKEZO", wait: "PUMZIKA: ", cdBtn: "MAPUMZIKO (10 MIN)", closeBtn: "FUNGA MAELEZO", waText: "KWA MAELEKEZO ZAIDI FUATA HII CHANELI", mHeader: "MWONGOZO WA USHINDI V12.5", mBody: "<div style='font-size:11px; color:#ccc; line-height:1.4;'><p>1. Tumia 1Win na Promo Code <b>MOON26</b> kwa usahihi wa 98%.</p><p>2. Copy <b>Hash</b> ya raundi ijayo na <b>Salt</b> ya raundi iliyopita kwenye Mines 'Provably Fair'.</p><p>3. Cheza raundi 3 tu, kisha app itajifunga kwa dakika 10 kulinda akaunti yako isifungiwe.</p><p>4. Fuata ishara ya ⭐ kuanza ushindi wako.</p></div>" },
            en: { lang: "LANG: EN", sound: "SOUND: ", lText: "SECURITY:", secure: " SECURE", round: "ROUND", btn: "GET SIGNAL 🚀", instBtn: "💡 INSTRUCTIONS", wait: "WAIT: ", cdBtn: "COOLDOWN (10 MIN)", closeBtn: "CLOSE", waText: "FOR MORE INSTRUCTIONS FOLLOW THIS CHANNEL", mHeader: "WINNING GUIDE V12.5", mBody: "<div style='font-size:11px; color:#ccc; line-height:1.4;'><p>1. Use 1Win with Promo Code <b>MOON26</b> for 98% accuracy.</p><p>2. Copy <b>Hash</b> and <b>Salt</b> from Mines 'Provably Fair' settings.</p><p>3. Play 3 rounds max, then wait 10 mins to avoid 1Win detection.</p><p>4. Follow the ⭐ symbols for guaranteed wins.</p></div>" }
        };

        function unlock() { if(document.getElementById('accessKey').value === 'Mr winner123') { document.getElementById('loginOverlay').style.display = 'none'; checkExistingCD(); } }
        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); refreshUI(); }
        function toggleMute() { muted = !muted; refreshUI(); }
        function updateWinRate() { const b = document.getElementById('bombSelect').value; document.getElementById('rText').innerText = (b === "5" ? "90%" : "98%") + translations[currentLang].secure; }

        function forceSystemReset() { roundIdx = 0; isCooldownActive = false; localStorage.removeItem('predictorRound'); localStorage.removeItem('predictorCooldown'); refreshUI(); autoClear(); }

        function refreshUI() {
            const t = translations[currentLang];
            document.getElementById('langBtn').innerText = t.lang;
            document.getElementById('volBtn').innerText = t.sound + (muted ? "OFF" : "ON");
            document.getElementById('lText').innerText = t.lText;
            document.getElementById('roundLbl').innerText = t.round;
            document.getElementById('instBtn').innerText = t.instBtn;
            document.getElementById('modalTitle').innerText = t.mHeader;
            document.getElementById('modalContent').innerHTML = t.mBody;
            document.getElementById('closeModalBtn').innerText = t.closeBtn;
            document.getElementById('waLinkBtn').innerText = t.waText;
            updateWinRate();
            if(!isCooldownActive) { 
                document.getElementById('mainBtn').innerText = t.btn; 
                document.getElementById('mainBtn').disabled = false; 
                document.getElementById('activeRound').innerText = roundIdx;
            }
        }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) { const d = document.createElement('div'); d.className = 'cell shaded'; d.id = 'cell-' + i; grid.appendChild(d); }

        function autoClear() { if(isCooldownActive) return; document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; c.className = 'cell shaded'; }); }

        function startAnalysis() {
            if(isCooldownActive || roundIdx >= MAX_ROUNDS) return;
            const h = document.getElementById('hashIn').value, s = document.getElementById('saltIn').value;
            if(h.length < 5 || s.length < 5) { triggerVibrate([50,50]); return; }
            
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('loaderWrap').style.display = 'block';
            let p = 0;
            const timer = setInterval(() => { 
                p += 5; document.getElementById('loaderBar').style.width = p + "%"; 
                if(p >= 100) { clearInterval(timer); runLogic(h, s); } 
            }, 30);
        }

        function runLogic(h, s) {
            roundIdx++; localStorage.setItem('predictorRound', roundIdx);
            document.getElementById('activeRound').innerText = roundIdx;
            autoClear();

            // Algorithm iliyoboreshwa ya Usahihi
            let combinedSeed = h + s + roundIdx + "ULTRA_V12";
            let hash = 0; for(let i=0; i<combinedSeed.length; i++) hash = ((hash << 5) - hash) + combinedSeed.charCodeAt(i);
            
            let positions = Array.from({length: 25}, (_, i) => i);
            let result = [];
            for(let i=0; i<3; i++) {
                let index = Math.abs(Math.sin(hash + i) * 10000) % positions.length;
                result.push(positions.splice(Math.floor(index), 1)[0]);
            }

            result.forEach((idx, i) => { 
                setTimeout(() => { 
                    const c = document.getElementById('cell-' + idx);
                    c.innerHTML = '⭐'; c.className = 'cell safe'; 
                    playSound(700 + (i*150), 'triangle', 0.2); triggerVibrate(60);
                }, i * 350); 
            });

            document.getElementById('loaderWrap').style.display = 'none';
            if(roundIdx >= MAX_ROUNDS) {
                const end = Date.now() + 600000;
                localStorage.setItem('predictorCooldown', end);
                setTimeout(() => startCD(600), 1500);
            } else { document.getElementById('mainBtn').disabled = false; }
        }

        function startCD(sec) {
            isCooldownActive = true; 
            const timerEl = document.getElementById('cooldownDisplay'), btn = document.getElementById('mainBtn');
            timerEl.style.display = 'block'; btn.disabled = true;
            const cd = setInterval(() => {
                let m = Math.floor(sec/60), s = sec%60;
                timerEl.innerText = (currentLang === 'sw' ? "PUMZIKA: " : "WAIT: ") + m + ":" + (s < 10 ? "0" : "") + s;
                btn.innerText = translations[currentLang].cdBtn;
                if(sec <= 0) { clearInterval(cd); forceSystemReset(); }
                sec--;
            }, 1000);
        }

        function checkExistingCD() {
            const end = localStorage.getItem('predictorCooldown');
            if(end) {
                const rem = Math.floor((parseInt(end) - Date.now()) / 1000);
                if(rem > 0) startCD(rem); else forceSystemReset();
            } else { refreshUI(); }
        }
        function toggleModal() { document.getElementById('modal').style.display = (document.getElementById('modal').style.display === 'block' ? 'none' : 'block'); }
        window.onload = refreshUI;
    </script>
</body>
</html>
