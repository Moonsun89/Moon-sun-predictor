<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V12.5 | ULTRA</title>
    <style>
        :root { --bg: #030508; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; --purple: #af40ff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; min-height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #0a0e14 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 30px rgba(0,123,255,0.2); }

        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 10px; z-index: 1000; }
        .btn-mini { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 6px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }

        .header-section { text-align: center; margin-top: 40px; margin-bottom: 5px; }
        .app-name { font-size: 21px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .c-y { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); } 
        .c-b { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .sub-title { font-size: 10px; color: var(--green); font-weight: bold; letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

        .info-panel { background: rgba(10, 14, 20, 0.8); padding: 10px; border-radius: 12px; margin: 5px 0 10px 0; width: 90%; max-width: 360px; text-align: center; border: 1px solid #1a2c3a; backdrop-filter: blur(10px); }
        .info-panel div { margin: 2px 0; }
        #cooldownDisplay { color: var(--red); font-size: 15px; font-weight: 900; display: none; margin-bottom: 8px; border: 2px solid var(--red); padding: 6px; border-radius: 10px; animation: blinker 1s infinite; background: rgba(255,51,51,0.1); width: 90%; max-width: 360px; text-align: center; }
        
        #warningLabel { color: var(--red); font-size: 12px; font-weight: bold; display: none; margin-bottom: 8px; animation: blinker 0.8s infinite; }
        @keyframes blinker { 50% { opacity: 0.4; } }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; box-shadow: inset 0 0 15px rgba(0,123,255,0.1); }
        .cell { width: 45px; height: 45px; background: #0d1218; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid #1b262f; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0,255,136,0.15); transform: scale(1.1) rotate(360deg); }
        .cell.shaded { background: #05080b; border: 1px solid #131d26; }

        input, select { width: 92%; max-width: 360px; padding: 10px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 10px; margin-bottom: 8px; text-align: center; outline: none; font-size: 12px; font-weight: bold; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); box-sizing: border-box; }
        #bombSelect { color: var(--yellow); cursor: pointer; border-color: var(--yellow); }

        #mainBtn { width: 92%; max-width: 360px; padding: 14px; background: linear-gradient(135deg, #007bff, #0052ad); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(0,123,255,0.4); transition: 0.2s; }
        #mainBtn:active { transform: scale(0.96); }
        #mainBtn:disabled { background: #1a2c3a; color: #555; box-shadow: none; transform: none; }

        #regBtn { width: 92%; max-width: 360px; padding: 14px; background: linear-gradient(45deg, var(--yellow), #ff9900); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-top: 8px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--yellow); } to { box-shadow: 0 0 15px var(--purple); } }

        .action-row { display: flex; width: 92%; max-width: 360px; gap: 8px; margin-top: 8px; }
        #clearBtn, #instBtn { flex: 1; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 11px; border: none; }
        #clearBtn { background: #1a2c3a; color: white; }
        #instBtn { background: #222; color: var(--yellow); border: 1px solid var(--yellow); }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-height: 90%; background: #0d1217; border: 2px solid var(--blue); border-radius: 20px; padding: 20px; z-index: 10000; overflow-y: auto; box-shadow: 0 0 100px #000; box-sizing: border-box; }
        .m-header { color: var(--yellow); font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        
        .wa-btn { display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 15px; padding: 14px; background: linear-gradient(45deg, #25d366, #128c7e); color: #fff; text-align: center; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 12px; box-shadow: 0 0 15px rgba(37,211,102,0.4); animation: pulse-wa 2s infinite; border: 1px solid #fff; box-sizing: border-box; }
        @keyframes pulse-wa { 0% { transform: scale(1); box-shadow: 0 0 10px rgba(37,211,102,0.4); } 50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(37,211,102,0.8); } 100% { transform: scale(1); box-shadow: 0 0 10px rgba(37,211,102,0.4); } }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--yellow); margin-bottom:5px;">MOON SUN PRO</h2>
            <p style="color:#777; font-size:12px; margin-bottom:20px;">ACCESS ENCRYPTED SYSTEM</p>
            <input type="password" id="accessKey" placeholder="Enter Secret Key...">
            <button onclick="unlock()" style="width:100%; padding:14px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold; letter-spacing:1px; margin-top:5px;">AUTHORIZE</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()" id="langBtn">LUGHA: SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SAUTI: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON SUN</span> <span class="c-b">PREDICTOR</span> <span class="c-g">V12.5</span></h1>
        <div class="sub-title">Mines 1win predictor</div>
    </div>

    <div class="info-panel">
        <div style="font-size:12px;"><span id="lText">USALAMA:</span> <span id="rText" style="font-weight:900;">95% UHAKIKA</span></div>
        <div style="font-size:16px; font-weight:bold; margin-top:4px;">
            <span id="roundLbl" style="color:var(--yellow);">RAUNDI</span> 
            <span style="color:#fff; background:var(--red); padding:2px 10px; border-radius:6px; margin:0 5px;" id="activeRound">0</span> 
            <span style="color:var(--yellow);">/ 3</span>
        </div>
    </div>

    <div id="cooldownDisplay">WAIT: 10:00</div>
    <div id="warningLabel">⚠️ WEKA HASH NA SALT KWANZA!</div>

    <select id="bombSelect" onchange="updateWinRate()">
        <option value="2">💣 MABOMU 2</option>
        <option value="3" selected>💣 MABOMU 3</option>
        <option value="5">💣 MABOMU 5</option>
        <option value="7">💣 MABOMU 7</option>
    </select>

    <input type="text" id="hashIn" placeholder="Paste Hash ya Raundi Ijayo...">
    <input type="text" id="saltIn" placeholder="Paste Salt ya Raundi Iliyopita...">

    <div id="loaderWrap" style="width:92%; max-width:360px; height:6px; background:#111; display:none; margin-bottom:8px; border-radius:10px; overflow:hidden;"><div id="loaderBar" style="height:100%; width:0%; background:linear-gradient(90deg, var(--blue), var(--purple)); transition: 0.1s;"></div></div>

    <div class="grid" id="gameGrid"></div>

    <button id="mainBtn" onclick="startAnalysis()">PATA SIGNAL 🚀</button>

    <a href="https://1win.com/registration?promo=MOON26" target="_blank" style="text-decoration:none; width:100%; display:flex; justify-content:center;">
        <button id="regBtn">JISAJIRI 1WIN HAPA (PROMO: MOON26)</button>
    </a>
    
    <div class="action-row">
        <button id="clearBtn" onclick="autoClear()">🔄 AUTO CLEAR</button>
        <button id="instBtn" onclick="toggleModal()">💡 MAELEKEZO</button>
    </div>

    <div id="modal">
        <div id="modalTitle" class="m-header">MWONGOZO KAMILI WA USHINDI</div>
        <div id="modalContent"></div>
        <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" target="_blank" class="wa-btn" id="waLinkBtn">KWA MAELEKEZO ZAIDI FUATA HII CHANELI</a>
        <button id="closeModalBtn" onclick="toggleModal()" style="width:100%; margin-top:10px; padding:12px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold; font-size:13px; cursor:pointer;">FUNGA</button>
    </div>

    <script>
        let roundIdx = parseInt(localStorage.getItem('predictorRound')) || 0;
        let currentLang = 'sw';
        let muted = false;
        let isCooldownActive = false;
        const MAX_ROUNDS = 3;

        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playSound(freq, type, duration, vol = 0.4) {
            if (muted) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function triggerVibrate(ms = 50) { if (navigator.vibrate) navigator.vibrate(ms); }

        const translations = {
            sw: {
                lang: "LUGHA: SW", sound: "SAUTI: ", lText: "USALAMA:", secure: " UHAKIKA", round: "RAUNDI",
                btn: "PATA SIGNAL 🚀", instBtn: "💡 MAELEKEZO", wait: "PUMZIKA: ", cdBtn: "MAPUMZIKO (MIN 10)",
                closeBtn: "FUNGA MAELEZO", waText: "KWA MAELEKEZO ZAIDI FUATA HII CHANELI",
                mHeader: "MWONGOZO KAMILI WA USHINDI",
                mBody: `
                    <div style="text-align:left; font-size:12px; color:#ddd; line-height:1.6;">
                        <p><b style="color:var(--yellow)">1. PROMO CODE (LAZIMA):</b> Jisajili 1Win ukitumia promo code <b>MOON26</b>. Bila hii, mfumo hautasoma akaunti yako kikamilifu.</p>
                        <p><b style="color:var(--yellow)">2. HASH NA SALT:</b> Kabla hujacheza, nenda kwenye 'Provably Fair' ndani ya Mines (1Win). Copy <i>Hash</i> ya raundi ijayo na <i>Salt</i> ya raundi iliyopita, kisha paste kwenye viboksi hapa juu.</p>
                        <p><b style="color:var(--yellow)">3. MABOMU:</b> Chagua idadi ya mabomu unayocheza 1Win (Tunashauri mabomu 3 kwa usalama wa 95%).</p>
                        <p><b style="color:var(--green)">4. RAUNDI 3 TU (3/3):</b> Muhimu! Usicheze zaidi ya raundi 3 mfululizo. Ukifikisha 3/3, app itakupa mapumziko ya dakika 10 ili kuzuia akaunti yako kufuatiliwa na 1Win.</p>
                    </div>
                `
            },
            en: {
                lang: "LANG: EN", sound: "SOUND: ", lText: "SECURITY:", secure: " SECURE", round: "ROUND",
                btn: "GET SIGNAL 🚀", instBtn: "💡 INSTRUCTIONS", wait: "WAIT: ", cdBtn: "COOLDOWN (10 MIN)",
                closeBtn: "CLOSE", waText: "FOR MORE INSTRUCTIONS FOLLOW THIS CHANNEL",
                mHeader: "FULL WINNING GUIDE",
                mBody: `
                    <div style="text-align:left; font-size:12px; color:#ddd; line-height:1.6;">
                        <p><b style="color:var(--yellow)">1. PROMO CODE (REQUIRED):</b> Register on 1Win using promo code <b>MOON26</b>. The algorithm needs this to sync perfectly.</p>
                        <p><b style="color:var(--yellow)">2. HASH & SALT:</b> Go to 'Provably Fair' in 1Win Mines. Copy the upcoming <i>Hash</i> and previous <i>Salt</i>, then paste them here.</p>
                        <p><b style="color:var(--yellow)">3. BOMBS:</b> Select your bomb count (We recommend 3 bombs for 95% safety).</p>
                        <p><b style="color:var(--green)">4. THE 3-ROUND RULE:</b> Crucial! Play exactly 3 rounds. Once you hit 3/3, the app will pause for 10 minutes to avoid detection by 1Win security.</p>
                    </div>
                `
            }
        };

        function unlock() { 
            if(document.getElementById('accessKey').value === 'Mr winner123') { 
                document.getElementById('loginOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loginOverlay').style.display = 'none', 500);
                initAudio(); playSound(800, 'triangle', 0.3); triggerVibrate(100);
                checkExistingCD(); 
            } 
        }

        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); playSound(500, 'sine', 0.1); refreshUI(); }
        function toggleMute() { muted = !muted; refreshUI(); }

        function updateWinRate() {
            const b = document.getElementById('bombSelect').value;
            let rate = b === "2" ? "98%" : b === "3" ? "95%" : b === "5" ? "90%" : "85%";
            const rText = document.getElementById('rText');
            rText.innerText = rate + translations[currentLang].secure;
            rText.style.color = b === "7" ? "var(--red)" : b === "5" ? "var(--yellow)" : "var(--green)";
        }

        function forceSystemReset() {
            roundIdx = 0;
            isCooldownActive = false;
            localStorage.removeItem('predictorRound');
            localStorage.removeItem('predictorCooldown');
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            document.getElementById('cooldownDisplay').style.display = 'none';
            autoClear();
            refreshUI();
        }

        function refreshUI() {
            const t = translations[currentLang];
            document.getElementById('langBtn').innerText = t.lang;
            document.getElementById('volBtn').innerText = t.sound + (muted ? "OFF" : "ON");
            document.getElementById('lText').innerText = t.lText;
            document.getElementById('roundLbl').innerText = t.round;
            document.getElementById('instBtn').innerText = t.instBtn;
            document.getElementById('modalTitle').innerText = t.mHeader;
            document.getElementById('modalContent').innerHTML = t.mBody;
            document.getElementById('closeModalBtn').innerText = t.closeBtn;
            document.getElementById('waLinkBtn').innerText = t.waText;
            updateWinRate();
            
            if(!isCooldownActive) { 
                const btn = document.getElementById('mainBtn');
                btn.innerText = t.btn; 
                btn.disabled = false; 
                document.getElementById('activeRound').innerText = roundIdx;
            }
        }

        function autoClear() { if(isCooldownActive) return; triggerVibrate(30); const cells = document.querySelectorAll('.cell'); cells.forEach(c => { c.innerHTML = ''; c.className = 'cell shaded'; }); document.getElementById('hashIn').value = ""; document.getElementById('saltIn').value = ""; }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) { const d = document.createElement('div'); d.className = 'cell shaded'; d.id = 'cell-' + i; grid.appendChild(d); }

        function startAnalysis() {
            if(isCooldownActive || roundIdx >= MAX_ROUNDS) return; 
            
            const h = document.getElementById('hashIn').value; const s = document.getElementById('saltIn').value;
            if(h.length < 10 || s.length < 10) { document.getElementById('warningLabel').style.display = 'block'; playSound(150, 'square', 0.3); triggerVibrate([50, 50, 50]); return; }
            document.getElementById('warningLabel').style.display = 'none';
            
            const btn = document.getElementById('mainBtn'); const bar = document.getElementById('loaderBar');
            btn.disabled = true; document.getElementById('loaderWrap').style.display = 'block';
            
            let p = 0;
            const timer = setInterval(() => { 
                p += 3; bar.style.width = p + "%"; 
                if(p % 10 === 0) playSound(600 + p, 'sine', 0.05, 0.1);
                if(p >= 100) { clearInterval(timer); runLogic(h, s); } 
            }, 30); 
        }

        function runLogic(h, s) {
            roundIdx++; 
            localStorage.setItem('predictorRound', roundIdx);
            document.getElementById('activeRound').innerText = roundIdx; 
            
            const cells = document.querySelectorAll('.cell'); cells.forEach(c => { c.innerHTML = ''; c.className = 'cell shaded'; });

            let seedStr = h + s + roundIdx + Date.now();
            let seed = 0; for(let i=0; i<seedStr.length; i++) { seed = ((seed << 5) - seed) + seedStr.charCodeAt(i); seed |= 0; }
            
            let pos = Array.from({length: 25}, (_, i) => i);
            for (let i = pos.length - 1; i > 0; i--) { 
                let x = Math.sin(seed++) * 10000; 
                let j = Math.floor((x - Math.floor(x)) * (i + 1)); 
                [pos[i], pos[j]] = [pos[j], pos[i]]; 
            }

            let safes = pos.slice(0, 3);
            safes.forEach((idx, i) => { 
                setTimeout(() => { 
                    const c = document.getElementById('cell-' + idx); 
                    c.innerHTML = '⭐'; c.className = 'cell safe'; 
                    playSound(800 + (i*200), 'triangle', 0.3); triggerVibrate(60);
                }, i * 400); 
            });

            document.getElementById('loaderWrap').style.display = 'none';
            
            if(roundIdx >= MAX_ROUNDS) { 
                const endTime = Date.now() + 600000; 
                localStorage.setItem('predictorCooldown', endTime); 
                setTimeout(() => { startCD(600); }, 1500); 
            } else { 
                document.getElementById('mainBtn').disabled = false; 
            }
        }

        function startCD(sec) {
            isCooldownActive = true; 
            const timerEl = document.getElementById('cooldownDisplay'); 
            const btn = document.getElementById('mainBtn');
            btn.disabled = true; timerEl.style.display = 'block';
            
            const cd = setInterval(() => {
                let m = Math.floor(sec/60); let s = sec%60;
                timerEl.innerText = (currentLang === 'sw' ? "PUMZIKA: " : "WAIT: ") + m + ":" + (s < 10 ? "0" : "") + s;
                btn.innerText = translations[currentLang].cdBtn;
                
                if(sec <= 0) { 
                    clearInterval(cd); 
                    forceSystemReset(); 
                    playSound(1000, 'sine', 0.5); 
                }
                sec--;
            }, 1000);
        }

        function checkExistingCD() { 
            const endTime = localStorage.getItem('predictorCooldown'); 
            if(endTime) { 
                const rem = Math.floor((parseInt(endTime) - Date.now()) / 1000); 
                if(rem > 0) {
                    startCD(rem); 
                } else { 
                    forceSystemReset(); 
                } 
            } else if (roundIdx >= MAX_ROUNDS) {
                forceSystemReset();
            } else {
                refreshUI(); 
            }
        }
        
        function toggleModal() { document.getElementById('modal').style.display = (document.getElementById('modal').style.display === 'block' ? 'none' : 'block'); playSound(400, 'sine', 0.1); }
        window.onload = refreshUI;
    </script>
</body>
</html>
