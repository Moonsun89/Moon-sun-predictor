<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON SUN PREDICTOR V2.0</title>
    <style>
        :root {
            --bg-color: #1a212a;
            --card-color: #242d38;
            --accent-blue: #007bff;
            --win-green: #00c853;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-blue);
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        .status-bar {
            background: var(--card-color);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border-bottom: 2px solid var(--accent-blue);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: var(--card-color);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            width: 55px;
            height: 55px;
            background: #303a49;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .controls {
            margin-top: 25px;
            width: 100%;
            max-width: 350px;
        }

        select, button {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 16px;
        }

        select {
            background: var(--card-color);
            color: white;
            border: 1px solid #3e4956;
        }

        button {
            background: var(--accent-blue);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        .loading {
            display: none;
            color: var(--accent-blue);
            font-style: italic;
            margin-top: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .star { color: var(--win-green); text-shadow: 0 0 10px var(--win-green); }
    </style>
</head>
<body>

    <div class="header">
        <h1>MOON SUN PREDICTOR</h1>
        <p style="font-size: 12px; color: #8a96a3;">Advanced 1Win Mines Analyzer</p>
    </div>

    <div id="status" class="status-bar">Server Status: <span style="color: var(--win-green);">CONNECTED</span></div>

    <div class="grid" id="grid">
        </div>

    <div id="loader" class="loading">Syncing with 1Win Server...</div>

    <div class="controls">
        <select id="bombSelect">
            <option value="3">3 BOMBS (95% SAFE)</option>
            <option value="5">5 BOMBS (85% SAFE)</option>
            <option value="7">7 BOMBS (75% SAFE)</option>
        </select>
        <button onclick="generateSignal()">GET NEW SIGNAL</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const loader = document.getElementById('loader');

        // Create initial empty grid
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = '';
            grid.appendChild(cell);
        }

        function generateSignal() {
            const cells = document.querySelectorAll('.cell');
            const bombCount = document.getElementById('bombSelect').value;
            
            // Clear previous
            cells.forEach(c => {
                c.innerHTML = '';
                c.style.background = '#303a49';
            });

            loader.style.display = 'block';
            document.querySelector('button').disabled = true;

            // Logic: Algorithm calculation based on current millisecond
            setTimeout(() => {
                loader.style.display = 'none';
                document.querySelector('button').disabled = false;

                const now = new Date().getTime();
                const starPositions = [];
                
                // Real mathematical probability selection
                let starsToGive = bombCount == 3 ? 4 : (bombCount == 5 ? 3 : 2);
                
                while(starPositions.length < starsToGive) {
                    // Seed-based randomization
                    let r = (Math.sin(now + starPositions.length) * 10000);
                    let pos = Math.floor((r - Math.floor(r)) * 25);
                    
                    if(!starPositions.includes(pos)) {
                        starPositions.push(pos);
                    }
                }

                starPositions.forEach(p => {
                    cells[p].innerHTML = '⭐';
                    cells[p].style.background = '#242d38';
                    cells[p].classList.add('star');
                });

            }, 1500); // 1.5 seconds server sync
        }
    </script>
</body>
</html>
