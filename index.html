<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON SUN PREDICTOR - PRO</title>
    <style>
        :root { --bg: #0b141a; --card: #1e2a33; --blue: #007bff; --green: #00c853; --yellow: #ffeb3b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .info-panel { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #303a49; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: var(--card); padding: 15px; border-radius: 12px; }
        .cell { width: 55px; height: 55px; background: #303a49; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 28px; transition: 0.3s; }
        .safe-3 { background: var(--green) !important; color: var(--yellow) !important; }
        .safe-5 { background: var(--blue) !important; color: var(--yellow) !important; }
        .safe-7 { background: var(--yellow) !important; color: var(--green) !important; }
        .controls { width: 100%; max-width: 350px; margin-top: 20px; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; opacity: 0.7; cursor: not-allowed; }
        #timer { color: #ff4444; font-weight: bold; font-size: 18px; }
        .loading { display: none; color: var(--blue); margin: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h2 style="color:var(--blue); margin-bottom:10px;">MOON SUN VIP</h2>
    
    <div class="info-panel">
        <div style="font-size: 18px; margin-bottom: 5px;">Round: <span id="roundDisplay" style="color:var(--yellow); font-weight:bold;">0</span>/3</div>
        <div id="cooldownSection" style="display:none;">
            <p style="margin:5px 0; font-size:13px;">Algorithm Reset in Progress...</p>
            <div id="timer">15:00</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>
    <div id="loader" class="loading">SYNCING SERVER SEEDS...</div>

    <div class="controls">
        <select id="bombSelect" style="width:100%; padding:12px; margin-bottom:15px; background:#1e2a33; color:white; border:1px solid #303a49; border-radius:5px;">
            <option value="3">3 BOMBS (GREEN MODE)</option>
            <option value="5">5 BOMBS (BLUE MODE)</option>
            <option value="7">7 BOMBS (GOLD MODE)</option>
        </select>
        <button id="mainBtn" onclick="runPrediction()">PATA SIGNAL 🚀</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const mainBtn = document.getElementById('mainBtn');
        const roundDisplay = document.getElementById('roundDisplay');
        const cooldownSection = document.getElementById('cooldownSection');
        const timerDisplay = document.getElementById('timer');

        // Initialize Grid
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        function refreshApp() {
            let rounds = parseInt(localStorage.getItem('moonRounds')) || 0;
            let lastUsed = parseInt(localStorage.getItem('moonTime')) || 0;
            const now = Date.now();
            const waitTime = 15 * 60 * 1000;

            roundDisplay.innerText = rounds;

            if (rounds >= 3) {
                const timeLeft = waitTime - (now - lastUsed);
                if (timeLeft > 0) {
                    mainBtn.disabled = true;
                    cooldownSection.style.display = 'block';
                    updateTimer(timeLeft);
                } else {
                    // Reset after 15 mins
                    localStorage.setItem('moonRounds', 0);
                    roundDisplay.innerText = "0";
                    mainBtn.disabled = false;
                    cooldownSection.style.display = 'none';
                }
            } else {
                mainBtn.disabled = false;
                cooldownSection.style.display = 'none';
            }
        }

        function updateTimer(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            const interval = setInterval(() => {
                let m = Math.floor(totalSeconds / 60);
                let s = totalSeconds % 60;
                timerDisplay.innerText = `${m}:${s < 10 ? '0' + s : s}`;
                totalSeconds--;

                if (totalSeconds < 0) {
                    clearInterval(interval);
                    refreshApp();
                }
            }, 1000);
        }

        function runPrediction() {
            const cells = document.querySelectorAll('.cell');
            const bombCount = document.getElementById('bombSelect').value;
            
            // UI Reset
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
            document.getElementById('loader').style.display = 'block';
            mainBtn.disabled = true;

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                
                // Prediction Logic
                const starQty = bombCount == 3 ? 4 : (bombCount == 5 ? 3 : 2);
                let picked = [];
                while(picked.length < starQty) {
                    let r = Math.floor(Math.random() * 25);
                    if(!picked.includes(r)) picked.push(r);
                }

                picked.forEach(p => {
                    cells[p].innerHTML = '⭐';
                    cells[p].classList.add(bombCount == 3 ? 'safe-3' : (bombCount == 5 ? 'safe-5' : 'safe-7'));
                });

                // Save State
                let currentRounds = (parseInt(localStorage.getItem('moonRounds')) || 0) + 1;
                localStorage.setItem('moonRounds', currentRounds);
                localStorage.setItem('moonTime', Date.now());

                refreshApp();
            }, 1500);
        }

        refreshApp();
    </script>
</body>
</html>
