<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.5.5 PRO</title>
    <style>
        :root { --bg: #030508; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }

        /* Security Overlay */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 85%; max-width: 300px; }

        /* Navigation */
        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 10px; z-index: 1000; }
        .btn-mini { background: rgba(0,123,255,0.1); color: var(--blue); border: 1px solid var(--blue); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        /* Header */
        .header-section { text-align: center; margin-top: 50px; }
        .app-name { font-size: 21px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .c-y { color: var(--yellow); } .c-b { color: var(--blue); } .c-g { color: var(--green); }

        /* Info Panels */
        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 90%; max-width: 340px; text-align: center; border: 1px solid #1a2c3a; }
        #cooldownDisplay { color: var(--red); font-size: 15px; font-weight: 900; display: none; margin-bottom: 10px; border: 1px solid var(--red); padding: 6px 18px; border-radius: 20px; animation: blinker 1s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0,255,136,0.1); }

        /* Main Buttons */
        input, select { width: 90%; max-width: 340px; padding: 13px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 10px; margin-bottom: 10px; text-align: center; outline: none; font-size: 12px; }
        #mainBtn { width: 90%; max-width: 340px; padding: 18px; background: linear-gradient(to right, #007bff, #0052ad); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .action-row { display: flex; width: 90%; max-width: 340px; gap: 10px; margin-top: 15px; align-items: center; }
        #clearBtn { flex: 3; padding: 14px; background: #1a2c3a; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #instBtn { flex: 1.5; padding: 12px; background: var(--yellow); color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; }

        /* Modal styling */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; max-height: 80%; background: #0d1217; border: 2px solid var(--blue); border-radius: 20px; padding: 25px; z-index: 10000; overflow-y: auto; }
        .m-blue { color: var(--blue); font-weight: bold; margin-top: 10px; }
        .m-yellow { color: var(--yellow); font-weight: bold; margin-top: 15px; }
        .m-link { color: var(--green); text-decoration: underline; font-weight: bold; word-break: break-all; cursor: pointer; display: block; margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h3 style="color:var(--yellow); margin-top:0;">ACCESS KEY</h3>
            <input type="password" id="accessKey" placeholder="Enter Key...">
            <button onclick="unlock()" style="width:100%; padding:14px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold;">LOGIN</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()">LANG: EN/SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SOUND: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON</span> <span class="c-b">SUN</span> <span class="c-g">PREDICTOR</span> <span class="c-y">V9.5 PRO</span></h1>
    </div>

    <div class="info-panel">
        <div><span style="color:var(--blue); font-weight:bold;" id="lText">KIWANGO CHA</span> <span style="color:var(--yellow); font-weight:bold;" id="rText"> USHINDI: 98%</span></div>
        <div style="font-size:17px; font-weight:bold; margin-top:5px;"><span id="roundLbl">MZUNGUKO</span> <span style="color:var(--red);" id="activeRound">0</span> / 4</div>
    </div>

    <div id="cooldownDisplay">WAIT: 10:00</div>
    <div id="warningLabel" style="color:var(--red); font-size:11px; font-weight:bold; display:none; margin-bottom:8px; text-align:center;">⚠️ ONYO: WEKA HASH NA SALT</div>

    <select id="bombCount" onchange="updateRate()"></select>
    <input type="text" id="hashIn" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltIn" placeholder="Salt ya Raundi Iliyopita...">

    <div id="loaderWrap" style="width:90%; height:5px; background:#000; display:none; margin-bottom:15px;"><div id="loaderBar" style="height:100%; width:0%; background:var(--green);"></div></div>

    <div class="grid" id="gameGrid"></div>

    <button id="mainBtn" onclick="startAnalysis()">PATA SIGNAL 🚀</button>
    
    <div class="action-row">
        <button id="clearBtn" onclick="location.reload()">🔄 AUTO CLEAR</button>
        <button id="instBtn" onclick="toggleModal()">Maelekezo</button>
    </div>

    <div id="modal">
        <h3 id="modalTitle" style="color:var(--yellow); text-align:center;">MAELEKEZO</h3>
        <div id="modalContent"></div>
        <button onclick="toggleModal()" style="width:100%; margin-top:20px; padding:12px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">FUNGA / CLOSE</button>
    </div>

    <script>
        let roundIdx = 0;
        let currentLang = 'sw';
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        const wsLink = "https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336";

        const translations = {
            sw: {
                lText: "KIWANGO CHA", rText: " USHINDI: ", round: "MZUNGUKO", warn: "⚠️ ONYO: WEKA HASH NA SALT",
                btn: "PATA SIGNAL 🚀", instBtn: "Maelekezo", bombTxt: "MABOMU", wait: "SUBIRI: ", cdBtn: "MUDA WA KUSUBIRI",
                mBody: `
                <div class="m-blue">1. Matumizi ya Batani:</div>
                - PATA SIGNAL: Hutoa zones salama.<br>
                - AUTO CLEAR: Hufuta historia ya mchezo.<br><br>
                <div class="m-blue">2. Hatua za Ushindi:</div>
                - Bet kwanza kwenye 1Win, kisha nakili Hash/Salt hapa.<br>
                - Fuata nyota kwa ushindi wa 4/4.<br><br>
                <div class="m-yellow">Kwa maelekezo zaidi fuata hii chaneli:</div>
                <a href="${wsLink}" class="m-link" target="_blank">BONYEZA HAPA KUJIUNGA NA WHATSAPP</a>`
            },
            en: {
                lText: "WINNING", rText: " RATE: ", round: "ROUND", warn: "⚠️ WARNING: ENTER HASH & SALT",
                btn: "GET SIGNAL 🚀", instBtn: "Instructions", bombTxt: "BOMBS", wait: "WAIT: ", cdBtn: "COOLDOWN ACTIVE",
                mBody: `
                <div class="m-blue">1. Button Usage:</div>
                - GET SIGNAL: Generates safe zones.<br>
                - AUTO CLEAR: Clears game history.<br><br>
                <div class="m-blue">2. Winning Steps:</div>
                - Bet first on 1Win, then paste Hash/Salt here.<br>
                - Follow stars for 4/4 win rate.<br><br>
                <div class="m-yellow">For more instructions follow this channel:</div>
                <a href="${wsLink}" class="m-link" target="_blank">CLICK HERE TO JOIN WHATSAPP</a>`
            }
        };

        function unlock() {
            if(document.getElementById('accessKey').value === 'Mr winner123') document.getElementById('loginOverlay').style.display = 'none';
        }

        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); refreshUI(); }
        
        function refreshUI() {
            const t = translations[currentLang];
            document.getElementById('lText').innerText = t.lText;
            document.getElementById('roundLbl').innerText = t.round;
            document.getElementById('instBtn').innerText = t.instBtn;
            document.getElementById('modalContent').innerHTML = t.mBody;
            
            const select = document.getElementById('bombCount');
            const val = select.value || "3";
            select.innerHTML = '';
            [2, 3, 5, 7].forEach(n => {
                const opt = document.createElement('option');
                opt.value = n; opt.text = `${t.bombTxt} ${n}`;
                if(n == val) opt.selected = true;
                select.appendChild(opt);
            });

            const btn = document.getElementById('mainBtn');
            btn.innerText = (roundIdx >= 4) ? t.cdBtn : t.btn;
            updateRate();
        }

        function updateRate() {
            const b = document.getElementById('bombCount').value;
            const rates = { "2": "98%", "3": "95%", "5": "85%", "7": "75%" };
            document.getElementById('rText').innerText = translations[currentLang].rText + rates[b];
        }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) {
            const d = document.createElement('div'); d.className = 'cell';
            grid.appendChild(d);
        }

        function startAnalysis() {
            const h = document.getElementById('hashIn').value;
            const s = document.getElementById('saltIn').value;
            if(!h || !s) { document.getElementById('warningLabel').style.display = 'block'; return; }
            document.getElementById('warningLabel').style.display = 'none';

            const btn = document.getElementById('mainBtn');
            const bar = document.getElementById('loaderBar');
            btn.disabled = true;
            document.getElementById('loaderWrap').style.display = 'block';
            
            let p = 0;
            const timer = setInterval(() => {
                p += 5; bar.style.width = p + "%";
                if(p >= 100) { clearInterval(timer); runLogic(h, s); }
            }, 50);
        }

        function runLogic(h, s) {
            roundIdx++;
            document.getElementById('activeRound').innerText = roundIdx;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            let seed = 0;
            let str = h + s + roundIdx + "STABLE_4/4_V9.5";
            for(let i=0; i<str.length; i++) seed = ((seed << 5) - seed) + str.charCodeAt(i);
            
            let tSeed = Math.abs(seed);
            let spots = [];
            while(spots.length < 4) {
                tSeed = (tSeed * 16807) % 2147483647;
                let pos = tSeed % 25;
                if(!spots.includes(pos)) spots.push(pos);
            }

            spots.forEach(idx => {
                cells[idx].innerHTML = '⭐';
                cells[idx].classList.add('safe');
            });

            document.getElementById('loaderWrap').style.display = 'none';
            setTimeout(() => {
                if(roundIdx < 4) { document.getElementById('mainBtn').disabled = false; } else { startCD(); }
            }, 1000);
        }

        function startCD() {
            const timerEl = document.getElementById('cooldownDisplay');
            const btn = document.getElementById('mainBtn');
            btn.innerText = translations[currentLang].cdBtn;
            timerEl.style.display = 'block';
            let sec = 600;
            const cd = setInterval(() => {
                let m = Math.floor(sec/60); let s = sec%60;
                timerEl.innerText = translations[currentLang].wait + m + ":" + (s < 10 ? "0" : "") + s;
                if(sec <= 0) {
                    clearInterval(cd); roundIdx = 0;
                    timerEl.style.display = 'none';
                    btn.disabled = false; refreshUI();
                }
                sec--;
            }, 1000);
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'block' ? 'none' : 'block');
        }

        window.onload = refreshUI;
    </script>
</body>
</html>
