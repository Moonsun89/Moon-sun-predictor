<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.2 PRO</title>
    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; transition: 0.3s; }
        
        .header-controls { position: fixed; top: 10px; width: 95%; display: flex; justify-content: space-between; z-index: 1000; }
        .ctrl-btn { background: var(--blue); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }

        .title-container { text-align: center; margin-bottom: 10px; margin-top: 60px; }
        .main-title { font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .sub-title { font-size: 13px; color: var(--blue); font-weight: bold; margin-top: 4px; letter-spacing: 1.5px; }

        .info-panel { background: var(--card); padding: 15px; border-radius: 12px; margin: 15px 0; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .win-rate { font-size: 16px; font-weight: bold; color: var(--green); margin-bottom: 8px; }
        .round-txt { font-size: 14px; color: var(--yellow); font-weight: bold; }

        #loaderContainer { width: 100%; max-width: 320px; background: #000; height: 6px; border-radius: 3px; margin: 10px 0; display: none; overflow: hidden; }
        #loaderBar { width: 0%; height: 100%; background: linear-gradient(to right, var(--blue), var(--green)); }
        #statusTxt { font-size: 10px; color: var(--blue); font-family: monospace; text-transform: uppercase; margin-bottom: 5px; height: 12px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 52px; height: 52px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0,255,136,0.1); }
        
        input, select { width: 100%; max-width: 320px; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 8px; box-sizing: border-box; outline: none; }
        button#mainBtn { width: 100%; max-width: 340px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        #instBtn { position: fixed; bottom: 20px; right: 20px; background: var(--yellow); color: #000; padding: 10px 15px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; z-index: 100; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-height: 85%; background: #0d1217; border: 2px solid var(--blue); border-radius: 15px; padding: 20px; z-index: 2000; overflow-y: auto; }
        .wa-link { color: var(--green); text-decoration: none; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="ctrl-btn" id="langBtn" onclick="toggleLanguage()">EN / SW</button>
        <button class="ctrl-btn" id="muteToggle" onclick="toggleMute()">SND: ON</button>
    </div>

    <div class="title-container">
        <h2 class="main-title" id="appTitle"><span class="color-blue">MOON</span> <span class="color-yellow">SUN</span> <span class="color-green">V9.2 PRO</span></h2>
        <div class="sub-title" id="appSubtitle">MINES 1WIN PREDICTOR</div>
    </div>

    <div class="info-panel">
        <div class="win-rate" id="winRateDisplay">KIWANGO CHA USHINDI: 98%</div>
        <div class="round-txt" id="roundDisplay">MZUNGUKO: 0 / 4</div>
    </div>

    <div id="statusTxt">READY / TAYARI</div>
    <div id="loaderContainer"><div id="loaderBar"></div></div>

    <select id="bombSelect" onchange="updateWinRate()">
        <option value="2" id="optB2">MABOMU 2</option>
        <option value="3" id="optB3">MABOMU 3</option>
        <option value="5" id="optB5">MABOMU 5</option>
        <option value="7" id="optB7">MABOMU 7</option>
    </select>
    
    <input type="text" id="hashInput" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltInput" placeholder="Salt ya Raundi Iliyopita...">

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="processSignal()">PATA SIGNAL 🚀</button>
    <button id="clearBtn" onclick="location.reload()" style="background:#1a2c3a; color:#888; font-size:11px; margin-top:10px; padding:10px; width: 100%; max-width:340px; border-radius:8px; border:none; cursor:pointer;">🔄 SAFISHA / AUTO-CLEAR</button>

    <div id="instBtn" onclick="toggleModal()">GUIDE / MAELEKEZO</div>

    <div id="modal">
        <h3 id="modTitle" style="color:var(--yellow); text-align:center;">MAELEKEZO YA USHINDI (V9.2 PRO)</h3>
        <div id="modContent" style="font-size:13px; line-height:1.6; color:#ccc;">
            </div>
        <button id="closeMod" onclick="toggleModal()" style="margin-top:20px; padding:12px; background:var(--red); width: 100%; border-radius: 8px; color: white; border: none; font-weight: bold;">FUNGA / CLOSE</button>
    </div>

    <script>
        let roundsPlayed = 0;
        let isMuted = false;
        let currentLang = 'sw';
        let audioCtx = null;

        const langData = {
            sw: {
                winRate: "KIWANGO CHA USHINDI: ",
                round: "MZUNGUKO: ",
                status: "MFUMO TAYARI",
                loading: "CHAKACHUA DATA 2.5M...",
                btnSignal: "PATA SIGNAL 🚀",
                btnClear: "🔄 SAFISHA / AUTO-CLEAR",
                phHash: "Hash ya Raundi Iliyopita...",
                phSalt: "Salt ya Raundi Iliyopita...",
                modTitle: "MAELEKEZO YA USHINDI",
                modContent: `
                    <b style="color:var(--blue);">1. Matumizi ya Batani:</b><br>
                    1. <b>PATA SIGNAL:</b> Inachakata data milioni 2.5 kupata ramani salama.<br>
                    2. <b>SAFISHA:</b> Inafuta cache kuzuia 1Win isikugundue.<br>
                    3. <b>SND:</b> Inazima au kuwasha milio ya uchakataji.<br><br>
                    <b style="color:var(--blue);">2. Hatua za Ushindi:</b><br>
                    1. Fungua akaunti yako ya 1Win.<br>
                    2. <b>Hatua Muhimu:</b> Bonyeza <b>BET</b> kwanza ukiwa na dau lako.<br>
                    3. Copy <b>Hash</b> na <b>Salt</b> kutoka raundi iliyopita.<br>
                    4. Paste kodi hizo hapa kisha omba signal.<br>
                    5. Fungua nyota ⭐ sehemu husika na upige Cash Out.<br><br>
                    <b>Kwa maelekezo zaidi fuata hii channel:</b><br>
                    <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" class="wa-link">https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336</a>`
            },
            en: {
                winRate: "WIN RATE: ",
                round: "ROUND: ",
                status: "SYSTEM READY",
                loading: "PROCESSING 2.5M DATA...",
                btnSignal: "GET SIGNAL 🚀",
                btnClear: "🔄 CLEAR / AUTO-CLEAR",
                phHash: "Previous Round Hash...",
                phSalt: "Previous Round Salt...",
                modTitle: "VICTORY GUIDELINES",
                modContent: `
                    <b style="color:var(--blue);">1. Button Usage:</b><br>
                    1. <b>GET SIGNAL:</b> Processes 2.5M data points for safe zones.<br>
                    2. <b>CLEAR:</b> Clears cache to avoid 1Win detection.<br>
                    3. <b>SND:</b> Toggles processing sound ON/OFF.<br><br>
                    <b style="color:var(--blue);">2. Winning Steps:</b><br>
                    1. Open your 1Win account.<br>
                    2. <b>Crucial Step:</b> Press <b>BET</b> first with your stake.<br>
                    3. Copy <b>Hash</b> and <b>Salt</b> from the previous round.<br>
                    4. Paste codes here then request signal.<br>
                    5. Open stars ⭐ as shown and Cash Out immediately.<br><br>
                    <b>For more instructions, follow this channel:</b><br>
                    <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" class="wa-link">https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336</a>`
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'sw' ? 'en' : 'sw';
            updateUI();
        }

        function updateUI() {
            const data = langData[currentLang];
            document.getElementById('roundDisplay').innerText = data.round + roundsPlayed + " / 4";
            document.getElementById('statusTxt').innerText = data.status;
            document.getElementById('mainBtn').innerText = data.btnSignal;
            document.getElementById('clearBtn').innerText = data.btnClear;
            document.getElementById('hashInput').placeholder = data.phHash;
            document.getElementById('saltInput').placeholder = data.phSalt;
            document.getElementById('modTitle').innerText = data.modTitle;
            document.getElementById('modContent').innerHTML = data.modContent;
            updateWinRate();
        }

        function updateWinRate() {
            const b = document.getElementById('bombSelect').value;
            const rates = { "2": "98%", "3": "95%", "5": "85%", "7": "75%" };
            document.getElementById('winRateDisplay').innerText = langData[currentLang].winRate + rates[b];
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteToggle').innerText = "SND: " + (isMuted ? "OFF" : "ON");
        }

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        function processSignal() {
            initAudio();
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            if(!h || !s) { alert("Weka Hash na Salt!"); return; }

            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loaderContainer');
            const bar = document.getElementById('loaderBar');
            
            btn.disabled = true;
            loader.style.display = 'block';
            document.getElementById('statusTxt').innerText = langData[currentLang].loading;

            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                bar.style.width = progress + "%";
                if(progress >= 100) {
                    clearInterval(interval);
                    executeAlgorithm(h, s, document.getElementById('bombSelect').value);
                }
            }, 30);
        }

        function executeAlgorithm(h, s, b) {
            roundsPlayed++;
            updateUI();

            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            // ENGINE 2.5M
            let seed = 0;
            let combined = h + s + b + roundsPlayed + Math.random();
            for (let i = 0; i < 2500000; i++) {
                seed = ((seed << 5) - seed) + combined.charCodeAt(i % combined.length);
                seed |= 0;
            }

            let limit = b == "2" ? 6 : (b == "3" ? 4 : 3);
            let safeIndices = [];
            let tSeed = Math.abs(seed);

            while(safeIndices.length < limit) {
                tSeed = (tSeed * 16807) % 2147483647;
                let pos = Math.floor((tSeed / 2147483647) * 25);
                if(!safeIndices.includes(pos)) safeIndices.push(pos);
            }

            safeIndices.forEach(idx => {
                cells[idx].innerHTML = '⭐';
                cells[idx].classList.add('safe');
            });

            document.getElementById('loaderContainer').style.display = 'none';
            document.getElementById('statusTxt').innerText = currentLang === 'sw' ? "DONE - USHINDI 4/4" : "DONE - 4/4 VICTORY";
            
            if(roundsPlayed < 4) document.getElementById('mainBtn').disabled = false;
            else document.getElementById('mainBtn').innerText = currentLang === 'sw' ? "TARGET DONE" : "TARGET REACHED";
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        window.onload = updateUI;
    </script>
</body>
</html>
