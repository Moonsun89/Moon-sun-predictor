<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR ULTRA | ODD SYNC V8</title>
    <style>
        :root { --bg: #020406; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; --cyan: #00f2ff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--cyan); text-align: center; width: 80%; max-width: 300px; }

        .top-nav { width: 95%; display: flex; justify-content: space-between; position: fixed; top: 10px; z-index: 1000; }
        .btn-mini { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .header-section { text-align: center; margin-top: 60px; }
        .app-name { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .sync-badge { font-size: 10px; color: var(--green); border: 1px solid var(--green); padding: 2px 10px; border-radius: 20px; margin-top: 5px; display: inline-block; animation: pulse 1.5s infinite; }

        .info-panel { background: rgba(10, 14, 20, 0.9); padding: 12px; border-radius: 12px; margin: 10px 0; width: 90%; max-width: 360px; text-align: center; border: 1px solid #1a2c3a; }
        #activeRound { background: var(--blue); padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        #warningLabel { color: var(--red); font-size: 12px; font-weight: bold; display: none; margin-bottom: 10px; text-align: center; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulse { 50% { opacity: 0.5; } }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--cyan); margin-bottom: 10px; }
        .cell { width: 50px; height: 50px; background: #0d1218; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid #1b262f; transition: 0.3s; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0,255,136,0.1); transform: scale(1.05); }

        input, select { width: 92%; max-width: 360px; padding: 12px; background: #05070a; border: 1px solid #1a2c3a; color: var(--green); border-radius: 10px; margin-bottom: 8px; text-align: center; outline: none; font-size: 13px; font-weight: bold; }
        
        #mainBtn { width: 92%; max-width: 360px; padding: 15px; background: linear-gradient(135deg, #007bff, #00c3ff); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #mainBtn:disabled { background: #1a2c3a; color: #444; }

        #loaderWrap { width: 92%; height: 4px; background: #111; display: none; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
        #loaderBar { height: 100%; width: 0%; background: var(--cyan); }

        #cooldownDisplay { color: var(--red); font-weight: 900; display: none; margin-bottom: 10px; border: 1px solid var(--red); padding: 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--yellow); margin:0;">NEURAL SYNC</h2>
            <p style="color:#555; font-size:11px; margin-bottom:20px;">V12.0.8 FULL ODD ACCESS</p>
            <input type="password" id="accessKey" placeholder="Password...">
            <button onclick="unlock()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">DECRYPT</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()" id="langBtn">LUGHA: SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SAUTI: ON</button>
    </div>

    <div class="header-section">
        <h1 class="app-name"><span style="color:var(--yellow);">MOON</span> <span style="color:var(--blue);">SUN</span> <span style="color:var(--cyan);">V8</span></h1>
        <div class="sync-badge">📡 FULL ODD MINUTE SYNC ENABLED</div>
    </div>

    <div class="info-panel">
        <div style="font-size:11px; color:#777;">SYSTEM STATUS: SECURE</div>
        <div style="margin-top:8px; font-size:15px;">
            <span id="roundLbl">MIZUNGUKO:</span> 
            <span id="activeRound">0</span> / 10
        </div>
    </div>

    <div id="cooldownDisplay">WAIT: 10:00</div>
    <div id="warningLabel"></div>

    <select id="bombSelect">
        <option value="2">💣 MABOMU 2</option>
        <option value="3" selected>💣 MABOMU 3</option>
        <option value="5">💣 MABOMU 5</option>
    </select>

    <input type="text" id="hashIn" placeholder="Enter Round Hash...">
    <input type="text" id="saltIn" placeholder="Enter Round Salt...">

    <div id="loaderWrap"><div id="loaderBar"></div></div>
    <div class="grid" id="gameGrid"></div>

    <button id="mainBtn" onclick="startAnalysis()">NEURAL ANALYSIS 🚀</button>

    <div style="margin-top:15px; width:92%; display:flex; gap:10px;">
        <button onclick="autoClear()" style="flex:1; padding:12px; background:#1a2c3a; color:white; border:none; border-radius:10px; font-size:11px; font-weight:bold;">RESET</button>
        <button onclick="location.reload()" style="flex:1; padding:12px; background:transparent; border:1px solid var(--yellow); color:var(--yellow); border-radius:10px; font-size:11px; font-weight:bold;">REFRESH</button>
    </div>

    <script>
        let roundIdx = parseInt(localStorage.getItem('predictorRound')) || 0;
        let currentLang = 'sw';
        let muted = false;
        let isCooldownActive = false;
        const MAX_ROUNDS = 10; 

        function unlock() { 
            if(document.getElementById('accessKey').value === 'Mr winner123') { 
                document.getElementById('loginOverlay').style.display = 'none';
                checkExistingCD(); 
            } 
        }

        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); refreshUI(); }
        function toggleMute() { muted = !muted; document.getElementById('volBtn').innerText = "SAUTI: " + (muted ? "OFF" : "ON"); }

        function refreshUI() {
            document.getElementById('langBtn').innerText = currentLang === 'sw' ? "LUGHA: SW" : "LANG: EN";
            document.getElementById('roundLbl').innerText = currentLang === 'sw' ? "MIZUNGUKO:" : "ROUNDS:";
            document.getElementById('activeRound').innerText = roundIdx;
        }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-' + i; grid.appendChild(d); }

        function autoClear() { if(isCooldownActive) return; const cells = document.querySelectorAll('.cell'); cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; }); }

        function startAnalysis() {
            if(isCooldownActive) return;
            const now = new Date();
            const min = now.getMinutes(); // Dakika kamili (0-59)
            const h = document.getElementById('hashIn').value; 
            const s = document.getElementById('saltIn').value;
            const warn = document.getElementById('warningLabel');

            // MFUMO WA DAKIKA WITIRI (1, 3, 5, 7, 9, 11, ... 59)
            if (min % 2 === 0) {
                warn.innerText = currentLang === 'sw' ? "⚠️ SUBIRI DAKIKA WITIRI (1, 3, 5, 7, 9, 11...)" : "⚠️ WAIT FOR ODD MINUTES (1, 3, 5, 7, 9, 11...)";
                warn.style.display = 'block'; return;
            }

            if(h.length < 10 || s.length < 10) { 
                warn.innerText = "⚠️ ENTER DATA FIRST!";
                warn.style.display = 'block'; return; 
            }

            warn.style.display = 'none';
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('loaderWrap').style.display = 'block';
            
            let p = 0;
            const bar = document.getElementById('loaderBar');
            const timer = setInterval(() => { 
                p += 2; bar.style.width = p + "%"; 
                if(p >= 100) { clearInterval(timer); runLogic(h, s); } 
            }, 30); 
        }

        function runLogic(h, s) {
            roundIdx++; localStorage.setItem('predictorRound', roundIdx);
            refreshUI();
            autoClear();

            let seedStr = h + s + Date.now();
            let seed = 0; 
            for(let i=0; i<seedStr.length; i++) { seed = ((seed << 5) - seed) + seedStr.charCodeAt(i); seed |= 0; }
            
            let pos = Array.from({length: 25}, (_, i) => i);
            for (let i = pos.length - 1; i > 0; i--) { 
                let x = Math.abs(Math.sin(seed++)) * 10000; 
                let j = Math.floor((x % 1) * (i + 1)); 
                [pos[i], pos[j]] = [pos[j], pos[i]]; 
            }

            let safes = pos.slice(0, 4);
            safes.forEach((idx, i) => { 
                setTimeout(() => { 
                    const c = document.getElementById('cell-' + idx); 
                    c.innerHTML = '⭐'; c.className = 'cell safe'; 
                    if(navigator.vibrate) navigator.vibrate(50);
                }, i * 400); 
            });

            document.getElementById('loaderWrap').style.display = 'none';
            if(roundIdx >= MAX_ROUNDS) { 
                setTimeout(() => { 
                    const end = Date.now() + 600000; 
                    localStorage.setItem('predictorCooldown', end); 
                    startCD(600); 
                }, 1500); 
            } else { document.getElementById('mainBtn').disabled = false; }
        }

        function startCD(sec) {
            isCooldownActive = true; 
            const timerEl = document.getElementById('cooldownDisplay'); 
            timerEl.style.display = 'block';
            const cd = setInterval(() => {
                if(sec <= 0) { 
                    clearInterval(cd); roundIdx = 0; isCooldownActive = false; 
                    localStorage.removeItem('predictorRound'); localStorage.removeItem('predictorCooldown'); 
                    timerEl.style.display = 'none'; document.getElementById('mainBtn').disabled = false; refreshUI(); return; 
                }
                let m = Math.floor(sec/60); let s = sec%60;
                timerEl.innerText = "PUMZIKA: " + m + ":" + (s < 10 ? "0" : "") + s;
                sec--;
            }, 1000);
        }

        function checkExistingCD() { 
            const end = localStorage.getItem('predictorCooldown'); 
            if(end) { 
                const rem = Math.floor((parseInt(end) - Date.now()) / 1000); 
                if(rem > 0) startCD(rem); 
                else { localStorage.removeItem('predictorCooldown'); roundIdx = 0; refreshUI(); } 
            } 
        }
        window.onload = refreshUI;
    </script>
</body>
</html>
