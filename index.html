<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.0</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">

    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            margin: 0; 
            min-height: 100vh;
            position: relative;
        }
        
        /* Fixed Background: Top to Down, Inafunika kioo, Opacity 0.12 (Kama Picha ya Kwanza) */
        #bgLayer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background-image: url('https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            opacity: 0.12;
        }

        /* SND Controls: Kushoto Juu (Vidogo kulingana na ombi) */
        .snd-controls { 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            z-index: 1000; 
            background: rgba(0,0,0,0.6); 
            padding: 5px; 
            border-radius: 6px; 
            border: 1px solid var(--blue);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .mini-btn { background: #12181f; border: 1px solid var(--blue); color: white; padding: 4px; border-radius: 4px; font-size: 8px; cursor: pointer; }
        .snd-select { background: #000; color: var(--yellow); border: 1px solid #1a2c3a; font-size: 8px; padding: 2px; }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .title-container { text-align: center; margin-bottom: 10px; margin-top: 45px; }
        .main-title { font-size: 22px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-title { font-size: 14px; font-weight: bold; margin-top: 5px; }
        .color-blue { color: var(--blue); } .color-yellow { color: var(--yellow); } .color-green { color: var(--green); }

        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin: 15px 0; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 52px; height: 52px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.1); }
        
        input[type="text"], select#bombSelect { width: 100%; max-width: 320px; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 12px; text-align: center; margin-bottom: 8px; }
        button#mainBtn { width: 100%; max-width: 340px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Guide Button: Chini Kulia (Kama Picha ya Kwanza) */
        #instBtn { position: fixed; bottom: 20px; right: 20px; background: var(--yellow); color: #000; padding: 10px 15px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bgLayer"></div>

    <div class="snd-controls">
        <button class="mini-btn" id="muteToggle" onclick="toggleMute()">SND: ON</button>
        <select id="soundPicker" class="snd-select" onchange="changeSound()">
            <option value="https://www.soundjay.com/buttons/sounds/button-37a.mp3">SOUND 1</option>
            <option value="https://www.soundjay.com/buttons/sounds/button-09a.mp3">SOUND 2</option>
            <option value="https://www.soundjay.com/buttons/sounds/button-10.mp3">SOUND 3</option>
            <option value="https://www.soundjay.com/buttons/sounds/button-20.mp3">SOUND 4</option>
            <option value="https://www.soundjay.com/buttons/sounds/beep-07a.mp3">SOUND 5</option>
        </select>
    </div>

    <div id="loginScreen">
        <h2 class="color-blue">MOON SUN ACCESS</h2>
        <input type="password" id="accessKey" placeholder="Enter Access Key">
        <button onclick="checkKey()" style="width:180px; padding: 12px; background: var(--blue); border: none; color: #fff; font-weight: bold;">LOGIN</button>
    </div>

    <div class="title-container">
        <h2 class="main-title"><span class="color-blue">MOON</span> <span class="color-yellow">SUN</span> <span class="color-green">PREDICTOR V9.0</span></h2>
        <div class="sub-title"><span class="color-green">MINES</span> <span class="color-blue">PREDICTOR</span> <span class="color-yellow">(1WIN)</span></div>
    </div>

    <div class="info-panel">
        <div class="win-rate" style="color:var(--green)">KIWANGO CHA USHINDI: 96%</div>
        <div style="color:var(--yellow)">MZUNGUKO: <span id="roundCounter" style="color:var(--red);">0</span> / 4</div>
    </div>

    <select id="bombSelect">
        <option value="3">3 BOMBS (95%)</option>
        <option value="5">5 BOMBS (85%)</option>
    </select>
    
    <input type="text" id="hashInput" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltInput" placeholder="Salt ya Raundi Iliyopita...">

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="processSignal()">PATA SIGNAL 🚀</button>

    <div id="instBtn" onclick="toggleGuide()">GUIDE</div>

    <script>
        let isMuted = false;
        let sfx = new Audio("https://www.soundjay.com/buttons/sounds/button-37a.mp3");

        function checkKey() {
            if(document.getElementById('accessKey').value === "Mr winner123") {
                document.getElementById('loginScreen').style.display = 'none';
                if(!isMuted) sfx.play();
            } else { alert("Wrong Access Key!"); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteToggle').innerText = isMuted ? "SND: OFF" : "SND: ON";
            document.getElementById('muteToggle').style.color = isMuted ? "red" : "lime";
        }

        function changeSound() {
            sfx.src = document.getElementById('soundPicker').value;
            if(!isMuted) sfx.play();
        }

        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        /* MAREKEBISHO: Kitufe cha Guide kinaonyesha maelekezo ya kweli */
        function toggleGuide() {
            alert('Step 1: Weka Hash/Salt ya Raundi Iliyopita.\nStep 2: Pata Signal ya 96%.\nStep 3: Piga Cash Out Mapema kulingana na Algorithm.');
        }

        function processSignal() {
            const hash = document.getElementById('hashInput').value;
            const salt = document.getElementById('saltInput').value;
            
            /* ONYO LA HASH/SALT LIMEUNGANISHWA HAPA (Sio kwenye Guide) */
            if(!hash || !salt) {
                alert('Ingiza Hash na Salt kisha bonyeza Pata Signal.');
                return;
            }

            if(!isMuted) sfx.play();
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            setTimeout(() => {
                let safeSpots = [2, 7, 12, 18]; 
                safeSpots.forEach(index => {
                    cells[index].innerHTML = '⭐';
                    cells[index].classList.add('safe');
                });
                document.getElementById('hashInput').value = "";
                document.getElementById('saltInput').value = "";
            }, 600);
        }
    </script>
</body>
</html>
