<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V8.8</title>
    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .title-header h2 { color: var(--blue); margin: 0; font-size: 20px; text-transform: uppercase; }
        .title-header span { color: var(--yellow); }
        .lang-btn { background: #1a2c3a; border: 1px solid var(--blue); color: var(--yellow); padding: 8px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; margin: 10px 0; font-weight: bold; }
        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .win-rate { font-size: 13px; color: var(--green); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 52px; height: 52px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.1); transition: 0.5s; }
        .input-group { width: 100%; max-width: 320px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 8px; box-sizing: border-box; }
        button { width: 100%; max-width: 340px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .refresh-btn { background: #1a2c3a; color: #888; padding: 12px; font-size: 12px; width: 240px; border: 1px solid #333; margin-top: 15px; border-radius: 5px; }
        #timerDisplay { color: var(--red); font-weight: bold; font-size: 18px; display: none; }
    </style>
</head>
<body>

    <div class="title-header"><h2>MOON SUN <span>V8.8 PRO</span></h2></div>
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">SWITCH TO ENGLISH</button>
    
    <div class="info-panel">
        <div class="win-rate" id="winRateDisplay">KIWANGO CHA USHINDI: 96%</div>
        <div id="cycleTxt">MZUNGUKO: <span id="roundCounter" style="color:var(--yellow);">0</span> / 4</div>
        <div id="timerDisplay">10:00</div>
    </div>

    <div class="input-group">
        <select id="bombSelect">
            <option value="2">2 BOMBS (96%)</option>
            <option value="3">3 BOMBS (95%)</option>
            <option value="5">5 BOMBS (85%)</option>
            <option value="7">7 BOMBS (75%)</option>
        </select>
        <input type="text" id="hashInput" placeholder="Weka Hash hapa...">
        <input type="text" id="saltInput" placeholder="Weka Salt hapa...">
    </div>

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="processSignal()">PATA SIGNAL 🚀</button>
    <button class="refresh-btn" onclick="location.reload()" id="refreshBtn">🔄 SAFISHA / AUTO-CLEAR</button>

    <script>
        let currentLang = 'sw';
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const dict = {
            sw: { langBtn: "SWITCH TO ENGLISH", win: "KIWANGO CHA USHINDI: ", cycle: "MZUNGUKO:", hash: "Weka Hash hapa...", salt: "Weka Salt hapa...", btn: "PATA SIGNAL 🚀", refresh: "🔄 SAFISHA / AUTO-CLEAR", cool: "SUBIRI:" },
            en: { langBtn: "BADILI KWENDA KISWAHILI", win: "WINNING RATE: ", cycle: "CYCLE:", hash: "Paste Hash here...", salt: "Paste Salt here...", btn: "GET SIGNAL 🚀", refresh: "🔄 REFRESH / AUTO-CLEAR", cool: "COOLDOWN:" }
        };

        function playScanSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function toggleLang() {
            currentLang = currentLang === 'sw' ? 'en' : 'sw';
            const d = dict[currentLang];
            document.getElementById('langBtn').innerText = d.langBtn;
            document.getElementById('cycleTxt').firstChild.textContent = d.cycle + " ";
            document.getElementById('hashInput').placeholder = d.hash;
            document.getElementById('saltInput').placeholder = d.salt;
            document.getElementById('mainBtn').innerText = d.btn;
            document.getElementById('refreshBtn').innerText = d.refresh;
            document.getElementById('winRateDisplay').innerText = d.win + " 96%";
        }

        // Initialize Grid
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            document.getElementById('grid').appendChild(cell);
        }

        function processSignal() {
            playScanSound();
            const hI = document.getElementById('hashInput');
            const sI = document.getElementById('saltInput');
            const h = hI.value; const s = sI.value;
            const b = document.getElementById('bombSelect').value;
            const cells = document.querySelectorAll('.cell');

            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            let seed = Date.now();
            let matrix = h + s + b;
            for(let i=0; i<1500000; i++) {
                seed = ((seed << 5) - seed) + matrix.charCodeAt(i % matrix.length);
                seed |= 0;
            }

            let safe = [];
            let tSeed = Math.abs(seed);
            let limit = b == "2" ? 6 : (b == "3" ? 4 : (b == "5" ? 3 : 2));

            while(safe.length < limit) {
                tSeed = (tSeed * 16807) % 2147483647;
                let p = Math.floor((tSeed / 2147483647) * 25);
                if(!safe.includes(p)) safe.push(p);
            }

            setTimeout(() => {
                safe.forEach(p => {
                    cells[p].innerHTML = '⭐';
                    cells[p].classList.add('safe');
                });
                hI.value = ""; sI.value = "";
                saveSession();
            }, 600);
        }

        function saveSession() {
            let r = (parseInt(localStorage.getItem('v88_r')) || 0) + 1;
            localStorage.setItem('v88_r', r);
            localStorage.setItem('v88_t', Date.now());
            updateView();
        }

        function updateView() {
            const r = parseInt(localStorage.getItem('v88_r')) || 0;
            const lt = parseInt(localStorage.getItem('v88_t')) || 0;
            document.getElementById('roundCounter').innerText = r;
            if (r >= 4) {
                const diff = (10 * 60 * 1000) - (Date.now() - lt);
                if (diff > 0) {
                    document.getElementById('mainBtn').disabled = true;
                    document.getElementById('timerDisplay').style.display = 'block';
                    let m = Math.floor(diff / 60000);
                    let s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timerDisplay').innerText = `${dict[currentLang].cool} ${m}:${s < 10 ? '0' : ''}${s}`;
                    setTimeout(updateView, 1000);
                } else {
                    localStorage.setItem('v88_r', 0);
                    location.reload();
                }
            }
        }
        window.onload = updateView;
    </script>
</body>
</html>
