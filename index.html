<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V8.5</title>
    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        
        .title-header { text-align: center; margin-bottom: 5px; }
        .title-header h2 { color: var(--blue); margin: 0; font-size: 22px; letter-spacing: 1px; }
        .title-header span { color: var(--yellow); }

        .lang-switcher { margin-bottom: 15px; }
        .lang-btn { background: transparent; border: 1px solid var(--blue); color: var(--blue); padding: 5px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }

        .info-panel { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .round-txt { font-size: 16px; margin: 5px 0; font-weight: bold; }
        #timerDisplay { color: var(--red); font-weight: 800; font-size: 20px; display: none; margin-top: 5px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 15px; }
        .cell { width: 52px; height: 52px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; transition: 0.3s; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.1); transform: scale(1.05); }

        .input-group { width: 100%; max-width: 320px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 8px; box-sizing: border-box; }
        
        .warning-box { width: 100%; max-width: 320px; color: var(--yellow); font-size: 10px; text-align: center; margin-bottom: 10px; min-height: 15px; font-style: italic; }

        button { width: 100%; max-width: 340px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .refresh-btn { background: #1a2c3a; color: #888; padding: 12px; font-size: 12px; width: 180px; border: 1px solid #333; }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="title-header">
        <h2>MOON SUN <span>PREDICTOR V8.5</span></h2>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">SWITCH TO ENGLISH</button>
    </div>
    
    <div class="info-panel">
        <div class="round-txt" id="cycleTxt">ROUND: <span id="roundCounter" style="color:var(--yellow);">0</span> / 4</div>
        <div id="timerDisplay">10:00</div>
    </div>

    <div class="input-group">
        <select id="bombSelect">
            <option value="2">2 BOMBS (6+ STARS)</option>
            <option value="3">3 BOMBS (4 STARS)</option>
            <option value="5">5 BOMBS (3 STARS)</option>
            <option value="7">7 BOMBS (2 STARS)</option>
        </select>
        <input type="text" id="hashInput" placeholder="Weka Hash hapa (Sio lazima)...">
        <input type="text" id="saltInput" placeholder="Weka Salt hapa (Sio lazima)...">
    </div>

    <div class="warning-box" id="warningTxt"></div>

    <div class="grid" id="grid"></div>

    <div class="controls" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <button id="mainBtn" onclick="generateLogic()">GET SIGNAL 🚀</button>
        <button class="refresh-btn" onclick="location.reload()" id="refreshBtn">🔄 REFRESH SYSTEM</button>
    </div>

    <script>
        let currentLang = 'sw';
        const dictionary = {
            sw: {
                langBtn: "SWITCH TO ENGLISH",
                cycle: "MZUNGUKO:",
                hash: "Weka Hash hapa (Sio lazima)...",
                salt: "Weka Salt hapa (Sio lazima)...",
                warning: "Hash na salt ni muhimu kwa ushindi wako!",
                btn: "GET SIGNAL 🚀",
                refresh: "🔄 REFRESH SYSTEM",
                cooldown: "SUBIRI:"
            },
            en: {
                langBtn: "BADILI KWENDA SWAHILI",
                cycle: "ROUND:",
                hash: "Paste Hash here (Optional)...",
                salt: "Paste Salt here (Optional)...",
                warning: "Hash and salt are vital for your win!",
                btn: "GET SIGNAL 🚀",
                refresh: "🔄 REFRESH SYSTEM",
                cooldown: "COOLDOWN:"
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'sw' ? 'en' : 'sw';
            const d = dictionary[currentLang];
            document.getElementById('langBtn').innerText = d.langBtn;
            document.getElementById('cycleTxt').firstChild.textContent = d.cycle + " ";
            document.getElementById('hashInput').placeholder = d.hash;
            document.getElementById('saltInput').placeholder = d.salt;
            document.getElementById('mainBtn').innerText = d.btn;
            document.getElementById('refreshBtn').innerText = d.refresh;
            if(document.getElementById('warningTxt').innerText !== "") {
                document.getElementById('warningTxt').innerText = d.warning;
            }
        }

        // Initialize Grid
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            document.getElementById('grid').appendChild(cell);
        }

        function generateLogic() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            const b = document.getElementById('bombSelect').value;
            const warning = document.getElementById('warningTxt');
            const cells = document.querySelectorAll('.cell');
            
            // Onyo kama Hash/Salt hazipo
            if(!h || !s) {
                warning.innerText = dictionary[currentLang].warning;
            } else {
                warning.innerText = "";
            }

            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            // Advanced Calculation (Simulating 1M+ data points processing)
            let seed = Date.now();
            let dataStr = h + s + b + "MOONSUN_MASTER_KEY_99";
            for(let i=0; i<dataStr.length; i++) {
                seed = ((seed << 5) - seed) + dataStr.charCodeAt(i);
                seed |= 0;
            }

            let safe = [];
            let tSeed = Math.abs(seed);
            let limit = b == "2" ? 6 : (b == "3" ? 4 : (b == "5" ? 3 : 2));

            while(safe.length < limit) {
                tSeed = (tSeed * 16807) % 2147483647;
                let p = Math.floor((tSeed / 2147483647) * 25);
                if(!safe.includes(p)) safe.push(p);
            }

            setTimeout(() => {
                safe.forEach(p => {
                    cells[p].innerHTML = '⭐';
                    cells[p].classList.add('safe');
                });
                saveRound();
            }, 500);
        }

        function saveRound() {
            let r = (parseInt(localStorage.getItem('v85_r')) || 0) + 1;
            localStorage.setItem('v85_r', r);
            localStorage.setItem('v85_time', Date.now());
            updateUI();
        }

        function updateUI() {
            const r = parseInt(localStorage.getItem('v85_r')) || 0;
            const lastTime = parseInt(localStorage.getItem('v85_time')) || 0;
            document.getElementById('roundCounter').innerText = r;

            if (r >= 4) {
                const diff = (10 * 60 * 1000) - (Date.now() - lastTime);
                if (diff > 0) {
                    document.getElementById('mainBtn').disabled = true;
                    document.getElementById('timerDisplay').style.display = 'block';
                    let m = Math.floor(diff / 60000);
                    let s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timerDisplay').innerText = `${dictionary[currentLang].cooldown} ${m}:${s < 10 ? '0' : ''}${s}`;
                    setTimeout(updateUI, 1000);
                } else {
                    localStorage.setItem('v85_r', 0);
                    location.reload();
                }
            }
        }
        
        window.onload = updateUI;
    </script>
</body>
</html>
