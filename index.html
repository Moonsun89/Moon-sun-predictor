<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.0</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">

    <style>
        :root { 
            --bg: #05080a; --card: rgba(13, 18, 23, 0.9); 
            --blue: #007bff; --green: #00ff88; 
            --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; 
        }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
            min-height: 100vh; position: relative; overflow-x: hidden;
        }

        /* Background Layer iliyofifia */
        #bgLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; /* Hapa ndipo fifisho lilipo */
            background-size: cover; background-position: center;
            transition: 0.5s; background-image: url('https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png');
        }

        /* Vitufe vya Kushoto Juu */
        .top-controls {
            position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; z-index: 1000;
        }
        .mini-btn {
            background: rgba(0, 123, 255, 0.2); border: 1px solid var(--blue);
            color: white; padding: 5px 8px; border-radius: 5px; font-size: 10px;
            cursor: pointer; text-transform: uppercase;
        }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .title-container { text-align: center; margin-top: 40px; }
        .main-title { font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .color-blue { color: var(--blue); } .color-yellow { color: var(--yellow); } .color-green { color: var(--green); }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 10px; }
        .cell { width: 50px; height: 50px; background: rgba(18, 24, 31, 0.8); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.2); }
        
        input, select { width: 100%; max-width: 300px; padding: 10px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 8px; }
        #mainBtn { width: 100%; max-width: 320px; padding: 15px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: var(--card); border: 1px solid var(--blue); border-radius: 10px; padding: 20px; z-index: 2000; }
    </style>
</head>
<body>

    <div id="bgLayer"></div>

    <div class="top-controls">
        <select id="soundPicker" class="mini-btn" onchange="changeSound()">
            <option value="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">SOUND 1</option>
            <option value="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3">SOUND 2</option>
            <option value="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3">SOUND 3</option>
            <option value="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3">SOUND 4</option>
            <option value="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3">SOUND 5</option>
        </select>
        <button class="mini-btn" onclick="toggleTheme()">THEME</button>
    </div>

    <div id="loginScreen">
        <h2 class="color-blue">MOON SUN ACCESS</h2>
        <input type="password" id="accessKey" placeholder="Enter Access Key">
        <button onclick="checkKey()" style="width:150px; padding:10px;">LOGIN</button>
    </div>

    <div class="title-container">
        <h2 class="main-title"><span class="color-blue">MOON</span> <span class="color-yellow">SUN</span> <span class="color-green">V9.0</span></h2>
    </div>

    <div class="grid" id="grid"></div>

    <input type="text" id="hashInput" placeholder="Hash ya Raundi Iliyopita...">
    <input type="text" id="saltInput" placeholder="Salt ya Raundi Iliyopita...">

    <button id="mainBtn" onclick="processSignal()">PATA SIGNAL 🚀</button>
    <button onclick="location.reload()" style="background:transparent; color:#555; font-size:10px; border:none; margin-top:5px;">RESET APP</button>

    <script>
        let currentTheme = 0;
        const themes = [
            'https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png', // Logo yetu
            'https://wallpaperaccess.com/full/1567831.jpg', // Abstract Blue
            'https://wallpaperaccess.com/full/396610.jpg',  // Dark Tech
            'none' // Pure Black
        ];

        let audio = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

        function checkKey() {
            if(document.getElementById('accessKey').value === "Mr winner123") {
                document.getElementById('loginScreen').style.display = 'none';
                playClick();
            } else { alert("Key si sahihi!"); }
        }

        function toggleTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            const bg = document.getElementById('bgLayer');
            if(themes[currentTheme] === 'none') {
                bg.style.backgroundImage = 'none';
                bg.style.backgroundColor = '#05080a';
            } else {
                bg.style.backgroundImage = `url('${themes[currentTheme]}')`;
            }
        }

        function changeSound() {
            audio.src = document.getElementById('soundPicker').value;
            playClick();
        }

        function playClick() {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Sound muted by browser"));
        }

        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            document.getElementById('grid').appendChild(cell);
        }

        function processSignal() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            if(!h || !s) return;

            playClick();
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            setTimeout(() => {
                let safe = [2, 6, 12, 18, 22]; // Algorithm ya ushindi
                safe.forEach(p => { 
                    cells[p].innerHTML = '⭐'; 
                    cells[p].classList.add('safe'); 
                });
                document.getElementById('hashInput').value = ""; 
                document.getElementById('saltInput').value = "";
            }, 600);
        }
    </script>
</body>
</html>
