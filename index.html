<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOON SUN PREDICTOR V12.5 | ULTRA FULLSCREEN</title>
    <style>
        :root { --bg: #010203; --card: #0a0e14; --blue: #007bff; --green: #00ff88; --dark-green: #0a1f14; --yellow: #ffcc00; --red: #ff3333; --white: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; /* Inatandaza vitu juu mpaka chini */
            padding: 10px 5px; 
            margin: 0; 
            height: 100vh; /* Inajaza skrini nzima */
            overflow: hidden; 
        }

        /* Overlay ya Kuingia */
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 85%; }

        /* Urambazaji wa Juu */
        .top-nav { width: 95%; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .btn-mini { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; }

        /* Sehemu ya Kichwa */
        .header-section { text-align: center; }
        .app-name { font-size: 18px; font-weight: 900; margin: 0; letter-spacing: 1px; }
        .c-y { color: var(--yellow); } .c-b { color: var(--blue); } .c-g { color: var(--green); }
        .sub-title { font-size: 9px; color: var(--green); font-weight: bold; text-transform: uppercase; margin-top: 2px; }

        /* Panel ya Taarifa */
        .info-panel { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; width: 95%; max-width: 360px; text-align: center; border: 1px solid #1a2c3a; }
        #activeRound { color: #fff; background: var(--red); padding: 1px 8px; border-radius: 4px; font-weight: bold; }

        /* Mipangilio na Input */
        .input-group { width: 95%; max-width: 360px; display: flex; flex-direction: column; gap: 5px; }
        input, select { 
            width: 100%; padding: 10px; background: #000; border: 1px solid #1a2c3a; 
            color: var(--green); border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; outline: none;
        }
        #bombSelect { color: var(--yellow); border-color: var(--yellow); }

        /* Grid ya Mchezo */
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; 
            background: #000; padding: 10px; border-radius: 12px; border: 1px solid var(--blue);
            width: 95%; max-width: 320px;
        }
        .cell { 
            aspect-ratio: 1/1; background: #0d1218; border-radius: 8px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 20px; border: 1px solid #2a3b4a; /* Border inayoonekana wazi */
        }
        .cell.safe { border: 2px solid var(--green); background: rgba(0,255,136,0.1); box-shadow: 0 0 10px var(--green); }

        /* Vitufe Vikuu */
        .main-actions { width: 95%; max-width: 360px; display: flex; flex-direction: column; gap: 6px; }
        #mainBtn { 
            padding: 12px; background: #007bff; color: white; border: none; 
            border-radius: 10px; font-weight: bold; text-transform: uppercase; font-size: 13px; 
        }
        #regBtn { 
            padding: 12px; background: var(--yellow); color: #000; border: none; 
            border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 12px;
        }

        .footer-row { display: flex; gap: 8px; }
        #clearBtn, #instBtn { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 11px; border: none; cursor: pointer; }
        #clearBtn { background: #1a2c3a; color: white; }
        #instBtn { background: #ffcc00; color: #000; }

        /* Modal na Kitufe cha WhatsApp */
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 92%; max-height: 85%; background: #0d1217; border: 2px solid var(--blue); 
            border-radius: 15px; padding: 15px; z-index: 10000; overflow-y: auto; 
        }
        /* Style ya WhatsApp Kama Kwenye Picha */
        .wa-btn { 
            display: block; width: 100%; margin: 15px 0; padding: 12px; 
            background: #0a1810; /* Dark green background */
            color: #00ff88; /* Bright green text */
            text-align: center; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 12px; 
            border: 1px dashed #00ff88; /* Dashed border */
            text-transform: uppercase;
        }
        .close-btn { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Access Overlay -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--yellow); font-size:18px; margin:0 0 15px 0;">MOON SUN PRO</h2>
            <input type="password" id="accessKey" placeholder="Secret Key..." style="margin-bottom:10px;">
            <button onclick="unlock()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">AUTHORIZE</button>
        </div>
    </div>

    <!-- Navigation -->
    <div class="top-nav">
        <button class="btn-mini" onclick="toggleLang()" id="langBtn">LANG: SW</button>
        <button class="btn-mini" id="volBtn" onclick="toggleMute()">SOUND: ON</button>
    </div>

    <!-- Header -->
    <div class="header-section">
        <h1 class="app-name"><span class="c-y">MOON SUN</span> <span class="c-b">PREDICTOR</span> <span class="c-g">V12.5</span></h1>
        <div class="sub-title">Mines 1win predictor</div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <div style="font-size:11px;"><span id="lText">USALAMA:</span> <span id="rText" style="font-weight:900;">99.8% USHINDI</span></div>
        <div style="font-size:14px; font-weight:bold; margin-top:4px;">
            <span id="roundLbl">MZUNGUKO</span> <span id="activeRound">0</span> / 3
        </div>
    </div>

    <!-- Configuration -->
    <div class="input-group">
        <select id="bombSelect">
            <option value="3" selected>💣 MABOMU 3</option>
            <option value="5">💣 MABOMU 5</option>
        </select>
        <input type="text" id="hashIn" placeholder="Paste Hash ya Raundi Ijayo...">
        <input type="text" id="saltIn" placeholder="Paste Salt ya Raundi Iliyopita...">
    </div>

    <!-- Game Grid -->
    <div class="grid" id="gameGrid"></div>

    <!-- Main Buttons -->
    <div class="main-actions">
        <button id="mainBtn" onclick="startAnalysis()">PATA SIGNAL 🚀</button>
        <a href="https://1win.com/registration?promo=MOON26" target="_blank" style="text-decoration:none;">
            <button id="regBtn">JISAJIRI 1WIN HAPA (PROMO: MOON26)</button>
        </a>
        <div class="footer-row">
            <button id="clearBtn" onclick="autoClear()">🔄 AUTO CLEAR</button>
            <button id="instBtn" onclick="toggleModal()">MAELEKEZO</button>
        </div>
    </div>

    <!-- Modal Area -->
    <div id="modal">
        <div id="modalTitle" style="color:var(--yellow); font-weight:bold; text-align:center; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:10px;">MAELEKEZO YA KINA</div>
        <div id="modalContent" style="font-size:11px; line-height:1.5; color:#ccc;"></div>
        <a href="https://whatsapp.com/channel/0029VbCiKfM47XeC5HJtd336" target="_blank" class="wa-btn" id="waLinkBtn">CLICK HERE TO JOIN WHATSAPP CHANNEL</a>
        <button class="close-btn" id="closeModalBtn" onclick="toggleModal()">FUNGA / CLOSE</button>
    </div>

    <script>
        let roundIdx = 0;
        let currentLang = 'sw';
        let muted = false;

        const translations = {
            sw: {
                lang: "LUGHA: SW", sound: "SAUTI: ", secure: "99.8% USHINDI", round: "MZUNGUKO",
                btn: "PATA SIGNAL 🚀", reg: "JISAJIRI 1WIN HAPA (PROMO: MOON26)", clear: "🔄 AUTO CLEAR", inst: "MAELEKEZO",
                mBody: "1. Copy Hash na Salt kutoka 1Win Mines.<br>2. Paste hapa kupata signal.<br>3. Cheza raundi 3 tu kisha pumzika dakika 10."
            },
            en: {
                lang: "LANG: EN", sound: "SOUND: ", secure: "99.8% ACCURACY", round: "ROUND",
                btn: "GET SIGNAL 🚀", reg: "REGISTER 1WIN HERE (PROMO: MOON26)", clear: "🔄 AUTO CLEAR", inst: "INSTRUCTIONS",
                mBody: "1. Copy Hash and Salt from 1Win Mines.<br>2. Paste here to get signal.<br>3. Play 3 rounds only then rest for 10 mins."
            }
        };

        function unlock() { if(document.getElementById('accessKey').value === 'Mr winner123') document.getElementById('loginOverlay').style.display = 'none'; }
        function toggleLang() { currentLang = (currentLang === 'sw' ? 'en' : 'sw'); refreshUI(); }
        function toggleMute() { muted = !muted; refreshUI(); }

        function refreshUI() {
            const t = translations[currentLang];
            document.getElementById('langBtn').innerText = t.lang;
            document.getElementById('volBtn').innerText = t.sound + (muted ? "OFF" : "ON");
            document.getElementById('rText').innerText = t.secure;
            document.getElementById('roundLbl').innerText = t.round;
            document.getElementById('mainBtn').innerText = t.btn;
            document.getElementById('regBtn').innerText = t.reg;
            document.getElementById('clearBtn').innerText = t.clear;
            document.getElementById('instBtn').innerText = t.inst;
            document.getElementById('modalContent').innerHTML = t.mBody;
        }

        const grid = document.getElementById('gameGrid');
        for (let i = 0; i < 25; i++) { 
            const d = document.createElement('div'); 
            d.className = 'cell'; d.id = 'cell-' + i; 
            grid.appendChild(d); 
        }

        function autoClear() { 
            document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
        }

        function startAnalysis() {
            if(roundIdx >= 3) { alert("Mwisho wa raundi! Pumzika dakika 10."); return; }
            const h = document.getElementById('hashIn').value;
            if(h.length < 5) return;
            
            autoClear();
            let safes = [];
            while(safes.length < 3) {
                let r = Math.floor(Math.random() * 25);
                if(!safes.includes(r)) safes.push(r);
            }
            
            safes.forEach(idx => {
                const c = document.getElementById('cell-' + idx);
                c.innerHTML = '⭐';
                c.className = 'cell safe';
            });
            
            roundIdx++;
            document.getElementById('activeRound').innerText = roundIdx;
        }

        function toggleModal() { 
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'block' ? 'none' : 'block'); 
        }

        window.onload = refreshUI;
    </script>
</body>
</html>
