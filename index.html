<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PRO - V8.2</title>
    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; transition: 0.3s; }
        .header { width: 95%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lang-btn { background: #1a2c3a; color: var(--yellow); border: 1px solid #333; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .info-panel { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 10px; width: 95%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #000; padding: 10px; border-radius: 15px; border: 2px solid var(--blue); }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: rgba(0, 255, 136, 0.2); animation: flash 1s infinite; }
        @keyframes flash { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .input-group { width: 95%; max-width: 320px; }
        input, select { width: 100%; padding: 11px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; margin-bottom: 8px; text-align: center; box-sizing: border-box; }
        .timer-box { color: var(--red); font-weight: bold; font-size: 12px; margin: 10px 0; display: none; }
        button { width: 95%; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .refresh-btn { background: #1a2c3a; color: #888; padding: 10px; font-size: 10px; width: 140px; margin-top: 10px; border: 1px solid #333; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color:var(--blue); font-weight:bold;">MOON SUN <span style="color:var(--yellow);">V8.2</span></div>
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN / SW</button>
    </div>
    
    <div class="info-panel">
        <div id="statusTxt" style="font-size: 11px; color: #888;">HALI: <span style="color:var(--green);">IMEUNGANISHWA</span></div>
        <div id="cycleTxt" style="font-size: 14px; margin: 5px 0;">MZUNGUKO: <span id="roundDisplay" style="color:var(--yellow); font-weight:bold;">0</span> / 4</div>
        <div id="timer" class="timer-box">COOLDOWN: 10:00</div>
    </div>

    <div class="input-group">
        <select id="bombSelect">
            <option value="2" id="opt2">2 BOMBS (6+ STARS)</option>
            <option value="3" id="opt3">3 BOMBS (4 STARS)</option>
            <option value="5" id="opt5">5 BOMBS (3 STARS)</option>
            <option value="7" id="opt7">7 BOMBS (2 STARS)</option>
        </select>
        <input type="text" id="hashInput" placeholder="Paste Hash hapa...">
        <input type="text" id="saltInput" placeholder="Paste Salt hapa...">
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls" style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 12px;">
        <button id="mainBtn" onclick="generateSignal()">GET SIGNAL 🚀</button>
        <div class="refresh-btn" onclick="location.reload()" id="resetBtn">🔄 FULL RESET</div>
    </div>

    <script>
        let currentLang = 'sw';
        const trans = {
            sw: { status: "HALI: IMEUNGANISHWA", cycle: "MZUNGUKO:", hash: "Paste Hash hapa...", salt: "Paste Salt hapa...", btn: "GET SIGNAL 🚀", reset: "🔄 FULL RESET", cool: "SUBIRI: " },
            en: { status: "STATUS: CONNECTED", cycle: "CYCLE:", hash: "Paste Hash here...", salt: "Paste Salt here...", btn: "GET SIGNAL 🚀", reset: "🔄 FULL RESET", cool: "COOLDOWN: " }
        };

        function toggleLang() {
            currentLang = currentLang === 'sw' ? 'en' : 'sw';
            document.getElementById('statusTxt').innerHTML = trans[currentLang].status;
            document.getElementById('cycleTxt').firstChild.textContent = trans[currentLang].cycle + " ";
            document.getElementById('hashInput').placeholder = trans[currentLang].hash;
            document.getElementById('saltInput').placeholder = trans[currentLang].salt;
            document.getElementById('mainBtn').innerText = trans[currentLang].btn;
            document.getElementById('resetBtn').innerText = trans[currentLang].reset;
        }

        // Gridi Setup
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            document.getElementById('grid').appendChild(cell);
        }

        function generateSignal() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            const b = document.getElementById('bombSelect').value;
            const cells = document.querySelectorAll('.cell');
            
            if(!h || !s) return alert("Ingiza Data!");

            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
            
            // Randomizer ya hali ya juu ili namba zisijirudie
            let seed = 0;
            let timeEntropy = Date.now().toString().slice(-4); 
            let combined = h + s + b + timeEntropy; 

            for(let i=0; i<combined.length; i++) {
                seed = ((seed << 5) - seed) + combined.charCodeAt(i);
                seed |= 0;
            }

            let safe = [];
            let tSeed = Math.abs(seed);
            let starLimit = b == "2" ? 6 : (b == "3" ? 4 : (b == "5" ? 3 : 2));
            
            while(safe.length < starLimit) {
                tSeed = (tSeed * 16807) % 2147483647;
                let p = Math.floor((tSeed / 2147483647) * 25);
                if(!safe.includes(p)) safe.push(p);
            }

            safe.forEach(p => {
                cells[p].innerHTML = '⭐';
                cells[p].classList.add('safe');
            });

            updateCycle();
        }

        function updateCycle() {
            let r = (parseInt(localStorage.getItem('v82_r')) || 0) + 1;
            localStorage.setItem('v82_r', r);
            document.getElementById('roundDisplay').innerText = r;
            
            if(r >= 4) {
                document.getElementById('mainBtn').disabled = true;
                startTimer(600); // 10 minutes
            }
        }

        function startTimer(seconds) {
            const timerDisplay = document.getElementById('timer');
            timerDisplay.style.display = 'block';
            let timeLeft = seconds;

            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `${trans[currentLang].cool} ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    localStorage.setItem('v82_r', 0);
                    location.reload();
                }
                timeLeft--;
            }, 1000);
        }

        // Angalia kama alikuwa kwenye cooldown
        window.onload = () => {
            let r = parseInt(localStorage.getItem('v82_r')) || 0;
            document.getElementById('roundDisplay').innerText = r;
            if(r >= 4) {
                document.getElementById('mainBtn').disabled = true;
                startTimer(300); // Resume cooldown (simplified)
            }
        }
    </script>
</body>
</html>
