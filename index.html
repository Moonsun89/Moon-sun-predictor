<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOON SUN PREDICTOR V9.0</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">

    <style>
        :root { --bg: #05080a; --card: #0d1217; --blue: #007bff; --green: #00ff88; --yellow: #ffcc00; --text: #ffffff; --red: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; position: relative; min-height: 100vh; }
        
        /* Dynamic Background Layer */
        #bgLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; transition: 0.3s; pointer-events: none; }

        /* Professional Controls (Top Left) */
        .controls-panel { position: absolute; top: 5px; left: 5px; display: flex; flex-direction: column; gap: 5px; z-index: 1000; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; border: 0.5px solid var(--blue); }
        .row { display: flex; gap: 5px; align-items: center; }
        .mini-label { font-size: 8px; color: var(--yellow); text-transform: uppercase; }
        .mini-btn { background: #12181f; border: 0.5px solid var(--blue); color: white; padding: 3px 5px; border-radius: 3px; font-size: 8px; cursor: pointer; }
        input[type="range"] { width: 60px; height: 3px; }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .title-container { text-align: center; margin-bottom: 5px; margin-top: 50px; }
        .main-title { font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .color-blue { color: var(--blue); } .color-yellow { color: var(--yellow); } .color-green { color: var(--green); }

        .info-panel { background: var(--card); padding: 10px; border-radius: 12px; margin: 10px 0; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1a2c3a; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #000; padding: 10px; border-radius: 15px; border: 1px solid var(--blue); }
        .cell { width: 50px; height: 50px; background: #12181f; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 1px solid #1b262f; }
        .cell.safe { border: 2px solid var(--green); box-shadow: 0 0 10px var(--green); background: rgba(0, 255, 136, 0.1); }
        
        input[type="text"], select { width: 100%; max-width: 310px; padding: 10px; background: #000; border: 1px solid #1a2c3a; color: var(--green); border-radius: 6px; font-size: 11px; text-align: center; margin-bottom: 5px; }
        button#mainBtn { width: 100%; max-width: 330px; padding: 14px; border-radius: 8px; border: none; background: linear-gradient(to right, #007bff, #0052ad); color: white; font-weight: bold; cursor: pointer; }
        #instBtn { position: fixed; bottom: 15px; right: 15px; background: var(--yellow); color: #000; padding: 8px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bgLayer" style="background-image: url('https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png'); opacity: 0.1;"></div>

    <div class="controls-panel">
        <div class="row">
            <span class="mini-label">SND:</span>
            <button class="mini-btn" id="sndStatus" onclick="toggleMute()">ON</button>
            <select id="soundPicker" class="mini-btn" onchange="updateSnd()">
                <option value="https://www.soundjay.com/buttons/sounds/button-37a.mp3">S1</option>
                <option value="https://www.soundjay.com/buttons/sounds/button-09a.mp3">S2</option>
                <option value="https://www.soundjay.com/buttons/sounds/button-20.mp3">S3</option>
            </select>
        </div>
        <div class="row">
            <span class="mini-label">IMG:</span>
            <select id="themePicker" class="mini-btn" onchange="updateTheme()">
                <option value="https://i.ibb.co/60D0Y59/CASH-OUT-LOGO.png">LOGO</option>
                <option value="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=500">BLUE</option>
                <option value="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=500">DARK</option>
                <option value="none">BLACK</option>
            </select>
        </div>
        <div class="row">
            <span class="mini-label">VIS:</span>
            <input type="range" min="0" max="50" value="10" oninput="updateOpacity(this.value)">
        </div>
    </div>

    <div id="loginScreen">
        <h3 class="color-blue">ACCESS KEY</h3>
        <input type="password" id="accessKey" placeholder="...">
        <button onclick="checkKey()" style="width:120px; padding:8px;">LOGIN</button>
    </div>

    <div class="title-container">
        <h2 class="main-title"><span class="color-blue">MOON</span> <span class="color-yellow">SUN</span> <span class="color-green">V9.0</span></h2>
    </div>

    <div class="info-panel">
        <div class="win-rate" style="font-size:12px;">WIN RATE: 96%</div>
        <div style="font-size:10px;">CYCLE: <span id="roundCounter" style="color:var(--yellow);">0</span> / 4</div>
    </div>

    <select id="bombSelect">
        <option value="3">3 BOMBS (95%)</option>
        <option value="5">5 BOMBS (85%)</option>
    </select>
    
    <input type="text" id="hashInput" placeholder="Paste Hash...">
    <input type="text" id="saltInput" placeholder="Paste Salt...">

    <div class="grid" id="grid"></div>

    <button id="mainBtn" onclick="processSignal()">PATA SIGNAL 🚀</button>

    <div id="instBtn" onclick="alert('Step 1: Paste Hash/Salt\nStep 2: Get Signal\nStep 3: Win 1Win')">GUIDE</div>

    <script>
        let isMuted = false;
        let sfx = new Audio("https://www.soundjay.com/buttons/sounds/button-37a.mp3");

        function checkKey() {
            if(document.getElementById('accessKey').value === "Mr winner123") {
                document.getElementById('loginScreen').style.display = 'none';
                if(!isMuted) sfx.play();
            } else { alert("Wrong Key!"); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('sndStatus').innerText = isMuted ? "OFF" : "ON";
            document.getElementById('sndStatus').style.color = isMuted ? "red" : "lime";
        }

        function updateSnd() { sfx.src = document.getElementById('soundPicker').value; if(!isMuted) sfx.play(); }
        
        function updateTheme() {
            const val = document.getElementById('themePicker').value;
            const bg = document.getElementById('bgLayer');
            bg.style.backgroundImage = val === 'none' ? 'none' : `url('${val}')`;
        }

        function updateOpacity(val) {
            document.getElementById('bgLayer').style.opacity = val / 100;
        }

        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            document.getElementById('grid').appendChild(cell);
        }

        function processSignal() {
            const h = document.getElementById('hashInput').value;
            const s = document.getElementById('saltInput').value;
            if(!h || !s) return;

            if(!isMuted) sfx.play();
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

            setTimeout(() => {
                let safe = [1, 7, 13, 19, 23]; // Elite Analytics
                safe.forEach(p => { cells[p].innerHTML = '⭐'; cells[p].classList.add('safe'); });
                document.getElementById('hashInput').value = ""; document.getElementById('saltInput').value = "";
            }, 600);
        }
    </script>
</body>
</html>
